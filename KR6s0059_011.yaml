body:
  text: 逍遙歌一首逍遙賦一首周穆王宴瑤池賦一首逍遙歌一首逍遙自在何拘束邈彼大方曠然白得指六合而無外臨萬機而有餘其居也何思其行也何慮含精抱一適性融真非夫天下之至人其孰能與於此哉天地希夷無返覆天地雖大其化均也若窮乎視聽之門極乎希夷之表則道無以塞德無以為所謂得天地之平也又何反覆哉勿把他心向外求道不在外而內自明真宗理道相和睦夫明白入素內外玄同者謂之真宗也既混然成性則與道相和故人天之樂在其中矣人間天上盡修行人天雖殊其道一也七寶山高混太清案靈寶經云玉清境者玄氣凝結而為此天有山如崑崙上廣下狹七寶騫林覆其上此皆結氣非實形也故此七寶之山巍巍崇高混於太清矣玉樹玄珠明照室亭亭王樹皎皎玄珠御於神室也命根悟者轉增盈太初真一之氣曰命之門曰靈之根悟之者乃能遊之於衆妙運之於無窮也虛無入有何蹤迹從無入有自有還無既形器之所莫拘諒隨迎之所不及非是神光化金液古之道也懷玄抱真育性養神長存正氣不昧玄津又何獨神光化於金液也廓落方圓在杳廓落自在隨方任圓蕩蕩焉出乎杳之上矣南來北去斷消息南離位也北坎位也可使由之不可使知之故云消息斷矣靈元物象向天涯靈元實始萬象之所由生既目天涯寧唯地表信所謂浩然無際也古往今來聖事誇道之至也往而不泯今而不昧來而不窮此聖人之事也實堪誇賞矣無礙智通精進心妙用縱橫觸途無礙智也天行健君子以自強不息故心通於精進矣研窮理路㸦交加剛柔相蕩魂魄相須研精窮極㸦有所長奇哉離焰烹鉛水奇哉神鼎之為利也鑠茲離焰粹彼鉛精煥若融輝湛乎凝水清靜之中藏奧旨蓋體虛無清淨之道也內含文明外光真智動靜交養龍虎相縻則玄奧之旨在其中矣出沒門景異常火足金花乍出乍沒抵掌千變消息萬端實異常也十洲隱大神仙子海內有十洲其上皆有真人遊處綿綿若論太幽深神化相生綿綿不斷載言妙旨幽而且深即是流珠不是金九轉還丹獨存靈汞是曰太陽流珠也既青龍化質亦君之象矣白虎乃金臣之象也以可兼下下不可僭上故非金也萬卷經文兼在目眇觀祕逖覽玄風載考真經何止萬卷皆拭目可知也機關絶妙有浮沉鉛水瀲灔真人在中以遊以泳載浮載沉此機關之妙也有之開關寤寐來相逼凡舍廬四面率開一門所以導風火往來也既動靜交處故寤寐相親亦風火之勢使然矣魄走魂歸天地力金之為魄陰精神也汞之為魂陽精神也金魄以其靜也不得自用汞魂以其動也不得自飛故海靜合一所以成乎天地造化之力矣風掃塵埃躡紫雲謝黃輿而密化映紅日以生埃綿期月以垂成穆清風而似掃峨峨獨秀赫矣疑丹色爛紫光如登雲馭也覩其顏貌難別識俄超四象邁五材雖顏貌之可觀且神靈之未辨議乎點化試以粉提不其難哉勿生疑慮變陰陽若明其火候則消息盈虛升降文武品之以律驗之以寒暄動靜有常剛柔斷矣則洞陰陽之變也夫復何疑須信丹砂道理長如上則丹砂之道理甚優長良可信也若向此中明此義若就此玄文明茲要義者指下句也十洲洞府蘊馨香十洲洞府皆仙者所居謂清芬必振於彼以其得逍遙之趣也康哉內景植仙桂攝正氣以資神統真精而固本內景也所謂植長生之桂居不死之鄉枝葉蔢䓾深根蒂根道氣也蒂精華也蔢䓾盛貌流茲七液灌彼五花乃深根固蒂之謂也則枝葉不得不盛矣真宗妙法審來由真一玄宗乃長生之妙法也審彼厥由有自來矣修鍊真空無涯際真空妙本也修之鍊之惟精惟一既日新其道即所趣無涯矣要知逆順莫相非極玄黃之數窮逆順之規自然而然無在不在豈有非也廣演周遮隱玄機達者敏在一言昧者煩乎多説先説艱難後始説或彼知難方堪演祕精窮運化遂相依精窮至妙運化無方內明養素之機外盡鉤深之旨遂相依也瑤池浴鳳通霄漢儀鳳浴於瑤池之上翔於碧落之邊金闕光舒何燦爛蓬瀛之上皆以黃金白銀而為官闕也丹成可驗不狐疑神鼎功全靈丹日滿鸞可驗脫屣何疑常娥偷竊月中看羿得長生之藥恆娥竊以奔月也春間花卉一齊開春之發也瓊花玉卉率土滋榮天上優遊誰肯來乍賞三清之景儀遺十洞之春飛羽駕以飄飄裊霞衣而燦燦真歸衆外高謝寰中洞裏煙霞牢祕隱洞天沙邈霞煥爛逈拔塵蒙故云祕隱水精宮殿白皚皚皚皚白貌水精光冷宮殿生寒皆真人之靈居也昔日神仙皆燒鍊大土養神上藥也其次養形中藥也巨葛洪之丹井猶存五色之雅言尚著是知昔日神仙成精此道也不説根由人豈見不指其源孰知其極本是凡情枉謾勞凡人之情不能禁精氣之戶牖復性命之本源導氣養神恬虛屏慮雖勞而無益也何年待得成九轉既昧金丹終賖九轉密藏無使等間知苟非其人道不虛授碧落真如在兩儀妙凝碧落玄契真如兩儀既分三才益著則萬物生乎其中矣所謂神以知來却以藏往也理外消停造化實真理之外法象而明大無不危細無不括善窮造化之功既名而日實也相逢遇偶勿懷疑玄解丹砂渙同冰釋直須意遣凡庸道常人不達攻乎異端謂金石可以假其精謂芝㭉可以登其算亦以為道也何足可依所以難言論祕奧聖人所以祕而重之者真一奧樞也可以神會勿以事求故其言也不亦難哉先令頓悟了然空色生於心心忘而象叔則外無所蔽也心生於象象了而心空則內有所明也故強名曰悟矣方扣玄關驅煩惱既而外無所取內無所捨取捨既絶彼此寧拘寂兮寥兮所矣大矣夫如是則可以造玄關可以滌煩惱從來教法甚分明原妙教之來則坦然明白幾許心迷事不成學者多類牛毛成者罕同麟角蓋心迷於妙道也棄世比圖間自性絶世高𮛫御氣隨風務盡真間優遊自性精修道路必長生精求妙訣修養內丹大道明然長生可趣歸童返老超升界歸童子之顏返老人之貌異乎超欲界而上三清正定威儀勿懈怠正心在定威容有儀以時規矩焉有怠哉開閇善能若苦勤日月有虧盈天地有開闔道之行也則而象之必在夫察彼琁璣觀乎鼎器勤勸夕惕斯為善也奮迅光陰同一泰奮迅者速疾之象也綿歷光陰倐焉拔萃和金結汞抱一還丹泰然神用也凡流學者不堅持入靈臺之妙者不知其所以持而持之真持也其有名未刊於仙籍學未䡄於宗師得謂之凡也或不能堅持耳生滅門中故不知有乎生有乎隱是謂天門也萬物出乎其中矣其誰能知之走縮陰陽無住相或出或處乍合乍離既有屈伸寧無走縮故陰陽之象也無住相焉非難非易細推之得其理也則非難失其用也則非易含胎十月無休歇藉金為種育汞成丹白春徂冬凡月滿于始終迭運子母相生曾無有間矣或作金兮或似雪或金花耀質或皓雪呈姿雖異態殊名必同才合伎認取還丹莫亂求旦還丹之為妙也法天地象日月惣五行之秀指四象之金汞以之相資神靈以之自著豈容易而成也故誡之焉獼猴水底弄明月素月流天寒光映水獼猴俯玩謂影可探徒甚勞形終弗能攬譬彼妄求還丹者皆理而外尋也靡量懵學沒困迷津逍遙賦一首𠃵象推功大圓洪覆生十太初既無言於四時乃垂象以示物昭昭在上而萬彚賴其功焉至道相宗至矣真道宗乎虛無觸類何拘逍遙靡滯推功歸本玄之又玄故曰人法地地法天天法道道法自然相宗之門無出於此矣逍遙理而不散𠃵以合化物乃流形鷓鷃各遂於逍遙情性俱臻於玄極所謂包羅四氣籠罩三光斯則不散之理矣赫奕高而且通大道不器在物咸真騰丹臺赫奕之光類昊天高大之用無際無極何往弗通信之者以陰陽太虛無窮自然成性欲彼群動奉而信之於是以月陰日陽之名生存神抱素之術俾其示於信者也祕之者以鉛汞夫長生久視沖邃幽深非俗骨凡肌之所學也乃假以鉛汞依之修鍊造次莫及祕而貴之名恍惚之何異或名恍惚或號杳稱謂雖殊玄關何異見出沒之無窮或寂默沖淡非象非形或高明沉潛可大可久自在之妙出沒無窮大道穹隆深仁常在無為大道衆妙之門嵩華不足喻其高滄溟不足匹其廣瞻望弗及則穹隆可尊矣至若發生為性肅教揚威雖二氣有差豈違乎大道深仁者矣騰三清而靡息混四溟而不改寓物生化與道浮沉騰三清於太上之都混四溟於渺瀰之府任物有陵谷而性靡改遷者乎雲凝似雪釋迷而頓悟虛無以剛柔之氣伏鉛汞之華當其月滿丹爐雲凝白雪必可以釋迷去滯頓悟虛無也鼎裏開花要妙而熠揚光彩金鼎初開玉花斯丘得要妙之訣成赫奕之姿光彩熠揚燦然耀目想初神明暗契景貺優遊存思其始也外節嗜欲內合希夷神明暗契於靈臺景貺自臻於象外子母成而入聖以鉛為母以金為子日月滿足脫落凡胎則為聖矣烏鵲飛而逗遛停騰日月之候哨息陰陽之期若烏鵲徘徊逗遛詳審而已可提撕而堪數一陽始生初伏神室中秋正望即見金丹其間時以提撕數其候度者也非雜類以相投狐兔不乳於馬燕雀不生於鳳務在誡乎雜類導養淳和者焉雲浮羽客之前方知禮讓外氣通明內神融適卿雲浮於寥廓羽駕翔乎碧虛絳節霓旌進退有序既登玄圃得不行禮讓之風乎洞府真人之喻𠕀測端由指洞府在鴻濛之外喻真人居崆洞之鄉求之於茲得之於彼若夫天地為一宅萬物為遊塵但修之於身必會之於道或背此而修鍊者得非𠕀測其端田乎及乎偃仰無蹤偃仰者消息也無蹤者妙本也是以聖人消息禦物之道歸乎妙本之中顯夫應用體虛善行無迹有為皆寂有之以為利無之以為用利用俱空動靜咸妙窺其戶牖須憑刀尺夫欲窺至虛之室者利器為先利器者乃有為之刀尺也千載遇而可化無為至道杳杳難名必臻可化之機方慶千年一遇九轉成而堪惜至哉大藥九轉功成諒惟寶重之心蓋蘊還淳之德達虧盈而動止若之相望月盈日吳之度陽動陰止之數皆可以理而遠之者蓋兩曜有相望之本也訣逆順以所思潛遁其迹黃赤二道或逆或順剛柔二功或隱或顯雖各務潛遁之迹悉可以至道而訣之何謂清者濁之本濁者清之徒言天先得一之功故為濁之本言地後得一之理故為清之徒風塵路合桂影蟾孤車馬路息風塵氣清觀桂影之扶踈由蟾光之獨朗由久恆持豈凡庸之能測久固至神任持大道識見豈容於凡庶逍遙已越於神仙元和獨立辨玄化之精太初始啓獨立權輿之本二儀次設乃眀巨細之由然則難將語默故不差殊至道離於名字不可以語默而詰之是知大音希聲何有差殊之狀也顯華夷之共泰執至道之正要光玄元之大猷自然遠肅邇安民康俗阜離煩惱之銷除三要精修五塵頓棄渙然冰釋仙器清虛物臨幽奧眇邈真如夫物藝藝而不知其道者蓋天行不言之令是以物臨幽奧皆處混茫之內也曷若習本靈元故依人望夫聖人作而萬物覩乃由習本靈元見真空體品彚依望就之猶日也豈不知寰瀛之內修得歸神仙之上妙治寰瀛功齊大易住出神仙之表恩施動植之中進退以時若鵬摶於廣漢卷舒在我猶雲起於長空是知不躍不行而在乎天也究龍吟之走作海嶽淵深天地為爐陰陽為炭藥成雲起變化斯須海嶽增深究之於道窮虎嘯之和平流珠通暢陽龍既吟陰虎必嘯雲生風起理之使然然而金鼎丹成流珠可比通暢顯無瑕之狀圓明彰精鍊之功且夫性靜希夷道性虛極入乎妙本故守雌靜而已道非聲故聽之不聞以其無聲之中獨能和焉故目之曰希道非色故視之不見以於無色之中而能色焉故名曰夷別識根基陰者道之基陽者形之始滋産萬物鴻漸於斯故智者別識焉信受而縱橫自在圓曜金鼎考績玄功先在諦求次乎信受然後含養真一自在玄都矣舉措而照鑒形儀夫大丹之道在天成象在地成形機張造化母育萬靈舉日以照之樹月以鑒之清得而金牙燦爛真一之道白金作基黃牙為母體之燦爛清淨圓明矣紅芳而碧葉交垂合花凝潤玉液含暉朱英得以紅芳鉛汞將生碧葉矣玉闕化成滌蕩愚蒙之見金基玉闕如神應物沖用無方發彼顓蒙滌除玄覽也煙霞綺靡用茲廣達之知遊宴玄言輕舉繁形霞綺靡玉樹玲瓏用達心知何人默識者矣於戲法教門中研精祕旨大道之門究暢真宗研核奧旨權輿天地茂養萬物妙本見素矣與陰陽而合德陰陽合孕沖氣調和然後萬物化成與道而合德也寂天地而同理有物之體真一混生寂寥虛靜妙本湛然齊天地之理也還丹至藥黃經云陽龍陰虎木液金精二氣交會鍊而成者謂之外丹調和元氣上入泥丸下注丹田偱環不息朝於絳宮此內丹也接聖境以周旋所尚虛寞所得玄默精感遐徹輕舉霄漢服餌紅漿而已日月齊明勿恣縱而善矣陰陽配其交媾日月同於照耀但可妙在虛通不可恣縱而已凡在人間各有長生道無私於物民日用而不知其或精感遐徹久視長生諒惟得矣我聒賢愚之耳聖人以沖氣和柔撝謙恤物暢大道之玄理誡勞生之封執者矣周穆王宴瑤池賦周穆王名滿昭王子也洎即位好神仙之道常欲使車轍馬迹遍於天下以倣黃帝焉後乘入駿之馬奔戎為右造父為御得白狐玄狢以祭河宍遂賔于西王母觴于瑤池之上王母乃歌白雲在天之謠王亦答之以余掃東土之什又云西王母降穆王之宮相與升雲而去矣馭駕神蹤八駿在馭翠蓋爰行將詣崑丘會於宴所也碧落香風既辭下土漸陟高空丁東風觸於珮環散漫香飄於黼黻矣靉靆之祥煙綺靡祥煙靉前綺靡可愛徐而引步何所不適哉縱橫之羽蓋迎空雜水仙仗縱撗翠蓋自空而迎以嚴導從夜景迢迢意思而奔赴瑤席星河燦燦雲路迢迢虔御金輿赴彼瑤席玄都未達意思邈然矣天高遠遠驅馳而直抵崑宮洞天遐阻龍驥驅馳遂抵崑宮館于仙境當其渾雜駢羅乍屆鼇峯方憩鑾輅駢闐綵仗羅列羽儀以衛蹕也情分賔主王母離席以迎穆王執圭以進既盡升降之禮乃分賔主之位也騰驤之駿馬何極王初命駕右服驊騮左𩥵緑耳神駿之驥騰凌驤首遠速之勢無極也𣫍袂之仙娥共覩天姿掩藹容顏絶世者則皆𣫍袂侍宴咸所覩焉既而靈貺集將欲飛觴舉白吐奇納秀故須列不夜之珠出未名之寶靈貺畢集斯為盛矣仙童侶仙童玉女群聚仙家往來妮侍左右也明月之圓將似晝組繡瑤池望月正午明皎如日流彩瑤池分華組晡物外之宴何樂如之金殿之高卷珠簾笙歌伎女玉闕金殿撶之於上珠簾翠幕軸之於中由是天樂既張衆啇咸舉或吹雲和之笙或鼓靈之簧或歌玄靈之曲皆盡其妙清音駭空也志慕求真穆天子以帝王之尊慕神仙之事故得名煥金蕑宴陪闕慕仙之志斯為至矣儼雅深仁仁深於物者必量司滄海有感則通期方外之遊事何不克輝華宴以初設即席未久仙宴乃啓飲琬琰之膏進甜雲之味素蓮黑棗碧藕白橘皆芳香襲人輝華照物也光幸輦以爭新境非浮世人惟上仙幸輦雖尊瓊筵更貴雲我去駕實曰爭新珊瑚器皿器皿之設於筵也七寶間錯五色曜奇深匪人上成自天匠也淥水波津瑤池之上有翠水焉王母每統群仙而遊之穆王因是得同登賞矣錦帳雲屏去就傳觴之旨張九華帳設雲母屏裝以金碧飾以珠翠若明星之連綴焉仙觴又坫獻酬合節無失雍雅也鸞歌鳳舞如常待客之陳歌則緩奏鸞音舞乃輕回鳳態侍客之儀亦如人間也虎嘯龍吟虎嘯而閬苑風生龍吟而崑山雲起萬籟微響五色分鮮也衣侍衆衣齊紈之眼戴天真之金玉相敲侍衛且衆也筵斟玉液之醞龍膏之醞斟之乃玉液也蓋言其珍潔以饗於賔尓樂奏琴瑟之弄奏以鈞天廣樂鼓以金徽瑤瑟正始之音𥊸之無怠也鶴鳴天上思羽駕而自在逍遙鶴以偌素之質嘹唳之音翱翔碧虛思陪羽駕異逍遙而自適也日昃烏傾薄塵世以從容舉動日盈則昃烏乃隨傾旦塵世短促陽光易墜洞府一朝人間百歲既不得從容取樂又豈能舉動而安神仙覩之真可薄也時也靈符降展情歡太上靈寶真一符契則還源之訣也仙母宣之於穆王王受已歡愜之情邈無涯矣贈玉帛以成禮玉帛贄幣也非仙所貴如薦蘋蘩以成其禮也搖翡翠以莊端首飾峩峩如搖翠羽端莊之態超然莫儔筵中之百媚花芳柳垂金線洞天花冉莫得而名間列于前相鮮奪日依依仙柳影亂金絲階上之雙娥對舞殿列鴛鸞寶殿瑤階鈞天九奏仙姝對舞婇御環立縹眇焉若鴛鸞之翔集爾既而窈窕周旋雍容自若高邁遊龍揖讓周旋益逾後素則闐關之義適足以詠歌矣徘徊不絶仙鄉日永世慮全無興逸情歡盤桓不已水精宮間於碧沼宮凝陰魄下枕碧流素彩清光虛眀掩映踟蹰周覽爽滌塵襟珠璣座臨於絳闕綴明月之珠鏤辟實之玉而為座爾前臨絳闕月素交輝炳煥晴空麗逾杲日九旒𭁺日黯於東海之中天冠九旒珠光明徹日輪西墜微覺黯然十二樓臺風揚於西波之月瀛洲山上有十二樓臺皆神仙之所居也風揚西溟波搖月影下視滄海如掌中焉復還五色雲頭萬𣲖分流雲含五色散以凝空瑤水分流縱橫萬𣲖也若木之金烏飛乍變東望飛烏才升若木壺中瞬息又見西沉塵西百齡信同隙駒之影也鏘風而白鹿鳴未收靈毛仙鹿情亦逍遙鳴戲天風呦呦未止眉開八字兮晶熒煙霞馥郁眉分八字光彩鑑人鳳腦香濃飄霞拂霧歌聲一曲兮縹眇銀漢優遊白雲歌起清掩貫珠漸過星河更資嘉賞白榆花下豈猒遲回何期遠恣情深馭駿追風雨遊八極逐尋仙境脫屣情深有無所得宴罷崑丘却還人世益易道喪神氣日衰酷志外求卒無所得瓊宮不讓於天上金屋玉堂萬乘攸霧人寰之貴豈讓三清人間非外於縱逸赤墀高峻丹禁深嚴觸目繁華足以行樂何須方外始曰勝遊哉終乃是非起而慕求仙穆王驅馳八駿尋訪仙鄉事迹雖奇去道遠是非蜂起無以辭焉如夢輕佻之客不能內復淳和外安黎庶妄求仙道得非輕易乎暫偶神仙終成退墜緬思宴會得非夢𥧌乎瑤池之上仙母為主穆王為賔故云客也甲辰歲高麗國分司大藏都監奉敕雕造
