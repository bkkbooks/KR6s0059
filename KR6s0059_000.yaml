body:
  text: 御製逍遙詠序輕玄元大道理包深遠玄元者虛極之妙本天地之元精淳湛一真凝然本寂所以伯陽宗其至道教演五千囊括虛無可謂深遠矣逍遙至論義貫精微逍遙者懸解之名沖虛曠達之義大鵬翔乎寥廓至人遊於無為放意於自得之場別物物任其性乃可妙契三無化周六合使澆漓之俗復淳朴之風精微之旨其在於斯朕聽覽之餘留心緗帙万機之餘不倦披覽雖漢武乙夜觀書無以過也三墳五典頗識指歸三墳者三皇之書二皇之道大於五帝五典者五帝之書五帝之道可以常行是以聖人皆達指歸妙盡其要者也金匱玉函亦探玄奧金匱玉函者太公黃石公所菩祕法也皆論六韜三略富國安民養生鍊神機權要妙雖其淵契盡皆探賾矣嘗念寡昧於道不達罔測津涯故發此詠題庶幾明白坦然矣夫欲明至道之極故著逍遙歌詠以暢宸襟而猶道成不宰謙卑益光遂發以罔測之辭尚假以庶幾之語故老子云江海能為百谷王宥以其善下故也夫道之妙也五行能之運化道本沖寂應用無方妙在卷舒成乎變化故在天曰五星在物曰五行經緯彝倫招蘇品彚也三才可以變通三才著象皆從其道道變無窮乃道乎天地人也虎嘯龍吟陽唱陰和此明至道自然之理且龍者水畜雲者水氣虎者陰物風者陰精以類相召自相符契故易云同聲相應同氣相求此其義也窮其祕也神明可辨於情狀道之祕也神全形具體與物𡨋原始要終窮理盡性推其情狀何深奧之不達哉究其精也剛柔自符於易簡廓然無間妙極太虛晝夜以之晦明寒暑因而來往所以𠃵剛坤柔自合易簡俾不為而善始不勞而善成苟非道之至微孰能詳放此乎而惑者昧於修己攻乎異端俟駕鶴而𩥵鸞猶繫風而捕影蒙昧之人不達至道謂神仙之可學顧囂塵而欲棄或置盤承露或築臺通天求駕鸞鶴亦猶繫風捕影不可得而及也老氏五千之旨尚不述於神仙老子所著五千言且不述神仙之事但欲顯道之玄極歸乎真源者矣莊周九萬之談理更超於言象南華云北溟有鵾化而為鵬九萬一程六月一息蓋舉其至大以類至散皆齊物理也是知事契精微理超言象誠哉莊生所諭實至道之樞要逍遙之妙旨也先賢脫皆知道而不言自昔達道之士既知道在於我所以不言老子云知者不言斯不誣矣庸愚困蒙豈希顏而議學庸昧之者妄學神仙有類希顏欲齊亞聖不亦遠乎昔秦始皇邪見所惑徒望蓬萊始皇帝為邪所惑道德不修妄學神仙欲求度世遂遣徐福往彼蓬萊採其靈藥徐福以無驗而不返始皇猶未悟而懸望矣漢武帝民力是輕莫尋員嶠漢武神智獨英武無倫尤好方士禱祈山嶽後感王母降於帝宮授以六甲辰生之訣自謂必登仙品芥視黎氓崇峻臺館坈戮降服既失上仙之誡莫尋貪嶓之靈矣斯皆不修仁德求利好貪守位曰仁好生曰德既殫民力復慕仙遊比轅適越良可悲矣事蓋不經良足太息事不師古動越典經百世之後斯過不泯誠堪太息者哉今之所述其殆庶乎殆近也庶幾道也今茲所製或象陰陽則𠃵坤而演妙或明金水法離坎以談玄追莊老清淨之遐蹤繼藏軒淳元之絶䡄近乎至道樂矣大方且非慕彼神仙之術也或近取諸身或內養純和之氣靜修真一之心動合靈源咸歸妙本也或遠取諸物或以日精月華鉛水金液託其象而成其言也其詣理也不可以一途執窮其理也則必有所詣詣其理者乃能成天下之務也至若適時知變在乎幾也又焉可以一途而執哉其筌意也不可以一理求徵其意也則必因於筌筌其意者乃能通天下之志也至若窮神極化在乎深也又焉可以一理而求哉探賾幽微探賾之妙通幽洞微參詳法度極思參詳規矩法度智者見之謂之智仁者見之謂之仁俾夫智者覽逍遙之旨則動而無窮也仁者得逍遙之道則淡乎無為也玄覽而可以照三清上清玉清太清謂之三清也玄覽心照也混尓真心朗然玄照越彼三天之上也旁行而可以通萬有不疾而速未兆而萌仁智之所莫拘動靜之所一致既周行無礙又何萬有而不通哉夫詩頌歌辭華而不實泛而論之不務其實則或傷於華也上不足以補時政之闕失時政之本務求其實必尚華言終無所補也次不足以救蒼生之弊病欲彼黎元咸躋富壽者義存道本也必尚彼浮詞誠不足以救蒼生之弊病矣假有獨擅其名弗精於用辭也者所以通萬物之情也假有專其述作之名昧彼述作之用所謂華而不實也義同畫餅棄不足文彩燦然形容儼若但堪恱目何可充腸就不足也爭如立至當之言以濟於時世者哉夫聖人之意其不可得而見也故觀之於象而形之於言應時之所求合世之所望義存精當妙在長生也所以姑務契理不取於文且務契彼真一之理故不取於藻麗之文貽尓方來悟夫懸解者矣庶幾貽厥將來好古博雅之上悟夫逍遙懸解之旨也
