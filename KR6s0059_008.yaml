body:
  text: 先賢所誡恐心邪先聖垂誠以警同邪正貞居中自然淳朴不説神眀道理耶夫道德之體神明之心應感不窮未嘗疲於動用之境也豈信爐中生白雪大藥之功世人罕測或乃四時可就或則九轉方成先見黃牙次飛白雪也是非汞內産丹砂夫陰陽抗行體性懸隔或則感氣而相得或乃變化以成形華池自有延齡藥黃帝云金丹之術百數其要在於神水華池內固其身而外靜其志也龍虎相逢王幾家龍者陽位虎者陰位若陰陽之契會猶龍虎以相從必用丹砂自能濟世十月陰陽須滿足丹房記云夫修大藥從春修制至十月畢功故云十月脫胎餘兩月沐浴餘殘審細勿教差華池之外白雪之餘更在用心勿令有成彩雲輕舉壓天津仙道已成乃能變化雲凝五色馭以飛騰縹眇陵虛高踰星漢舞鶴迎鸞自在身皓鶴彩鸞交翔接舞任情跨輕若乘風十洞三清往復無阻蟾影枝開三島樹三山峭拔逈倚層霄琪樹蔢䓾影分蟾魄桃花風弄十洲春碧桃花發春滿十洲風動瓊枝香薰杳靄相傳靈異無虛説蓬壺異境杳隔雲濤仙者所傳應非虛誕而塵中下士難以信之道理分眀盡是真修鍊功至神仙道成理趣昭然無非真妙但信此中深護慎雖凡智昧劣未達真源但可仰而信之則無過矣修行所願勿因循夫修行者必先使其志立其誓然後勤而行之則巧必成矣剛柔得所自安寧陰陽不差變化靡忒語剛柔則阻越言氣類則相生故制伏安寧神聖可驗五色霞光景象清功著道成內丹照灼霞舒五彩光含萬象應用無竭莫之與京龍倚吟雲雨至召雲者龍所以吟而雲雨至蓋雲者水氣也龍者水畜也氣類交感而相應焉虎依巖嘯澗風生風從虎故依巖嘯而谷風生此乃明陰中有陽㸦為主客相含養以至於道也從容海嶠非遙遠蓬洲閬苑皆依海而住境間象外迹異人間今藥成九轉名煥三清從容以遊故非遙遠倐忽煙蘿別有情煙蘿掩映巖竇曲盤得道之人於焉憩駕蓋窒嗜欲絶煩慮物外人間曠然情意故無疑滯也誰到真空間密地道性無方體之則神能達此間密運茲妙用其唯真人乎火輪玉闕鎮常眀火輪陽精玉闕陰粹光華相射明不暫歇既無私而恆在但有感而必通天非愛道許人修天稟至真固無私覆人守其道自合玄元非求所愛自契希夷學士愚迷不到頭道雖無方學則有緒而昧道者以噓吸為功藥餌為妙然可養形終非至理內境擬將何所用苟守內虛白不固外精既非元和安至乎道縱有所負抑亦何為杳知深邃故難求至真之理深邃之精以有名之筌通無象之法而𠕀知者難可尋求丹霞隱密堪依仗靈光有照目以丹霞內印無形爰彰隱密而達理通幽者誠堪依稟也雪月縱橫入品流夫道之妙者得用無滯凝明不窮况乎皓月凝霜青松戴雪可標品格可任縱橫消息頓然潛世慮消息盈虛窮達一氣內精外潔逸樂無為蕩蕩然何塵慮之可撓矣凡𭭛聖路有剛柔貞清者陽柔和至於聖道滓濁者陰剛佷極以凡途此兩者勝異雖殊制之在我也逍遙裏外混諸天內境外境諸天混然足可以暢彼逍遙足可以遠乎塵慮淡蕩其中四敘間二境參列萬象森然淡蕩熙和四敘無間拂拭塵埃明印月精純慕道不染塵埃真性融明猶乎朗月遍驅神鬼鎖驪山鞭驅山石使役鬼神謾塞滄溟究理何益嗟乎妄動寂絶驪山裝添出沒何奇異凡所裝成皆歸虛妄徒言奇異非道可稱祕隱藏真未是間有為合道徒自勞形祕隱真機未為間適但好消詳清景內消詳內境𡨋契虛無漱玄液於三瞧運清英於六氣勿生疑慮動機關體虛極之玄門必融通之上士狐疑塵慮不足可以奉行妄動機關詣道逾遠也口稱千嵗少年顏心長禦氣氣與神會內既有主形乃長存體合𮕱而不𮕱年當耄而不耄故雖稱千嵗而尚帶童顏也不是天人即地仙伶茲容貌儼若神仙望天則疑降自於三清指地則認來從於十洞四海五湖皆遍歷靜無所著動無所繫或乘興浮於四海或任運遊於五湖命侶嘯儔故皆遍歷十洲三島去周遷雖十洲路𨗿三島雲深必周流遷陟無往不通故仙者遷也謂老而無變遷入於山故稱仙矣道高舉措何優劣抱長生久視之道仰之而高故稱高矣若觀夫容止舉措動合成規既出乎是非之外復何優劣者哉精彩非常語更賢含和養氣懷玄抱真故精彩非常也抱朴子曰求仙者要當以忠孝和順仁信為本若德不修而但務方術者終不得長生也即此語之賢可以為國之紀可以副人之望也物理開襟通象外凡物之理豁開襟靈則幽通象外也未知幾許達深玄萬象歷然而人自昧必能頓兩妙理則逈遠深玄也鸞棲洞府影交加十洞九府鸞鳳所棲神仙所居無不翔集金鼎將成豈用誇成九還於金鼎就五色於仙經自協沖虛豈用誇誕向日迎陽爐上火日者陽之精也火者陽之華也夫向日迎其大陽以伏其鉛汞極陰之氣也中秋望月桂開華月者陰之精也秋者金方肅殺之氣也月臨秋氣已是純陰復至中秋桂華之久即太陰得位之極正也故丹砂拒火在乎極陰之氣也丹砂伏定縱橫藥用日月之正候就玄妙之靈功丹砂克成任縱橫萬藥不能動也白雪飛騰不離家變緣河之製涌白雪之光勢告飛騰然不離於天地之爐也一種為鉛鉛自化為金之鉛亦與常鉛一種也蓋制伏之術調候之功只向此鉛然而自化矣靈胎母子笑天涯陰陽候正母子道成神丹已出於靈胎天際可期於笑樂離男坎女甚清廉日月英華陰陽大道育養群品生化萬靈故老子云道生之德畜之各盡其清謹之用也金鼎分毫上火炎大藥在鼎用五行四象以陶鎔至道藏身以亡彼去我為玄妙差之纖毫必炎熾歘作矣莫把餘心懷利用失道於動起念於心欲期不乏之功永作濟世之用即去道遠矣古先學士誡無猒常思往古學道高人尤誡無猒冀臻於玄要也深藏異寶參詳理萬彚稟靈皆蘊道性若能詳究淵深必得達其妙旨已漸成形旋要添日月一年十二度合聖人取象三十日月月次開鼎添洗藥物方漸成靈丹大藥矣運轉但教經嵗月初自大易之始洎乎卦象火記之終其間一飛一伏一佐一助陰陽互相含養遂經長久矣光揚溢目衆人瞻玄功既就光彩輝雖溢目動人燦然可重矣何人曉了是兼非至道無方空之懸遠洞達其旨孰曉是非鉛汞從凡隱聖機金鼎大藥道在一真鉛汞也必能自神合聖道以修之考五行以鍊之是能變化通玄故聖機無隱也福壽丹砂隨日變丹藥功成服之不老五福之先遐壽為最驗其神用故隨日變也長生藥鼎負龍威爐安八卦鼎具四神甲乙青龍庚辛白虎丹必負威而服故能久視長生也秦皇漢武終邪見秦皇好道漢武慕仙徐福採藥以不還欒大訪術而受責徒思脫屣不務垂衣上德迷真誠為邪見大道神仙在杳大道虛無應之玄寂以守真而抱一用絶念以造玄故在杳視聽岡及學似牛毛成似角餐霞御氣捕影繫風者如牛毛而多矣還丹得就白日升天者况祥麟之一角舉世罕焉故然堪笑兩無依夫玄珠在水以𠕀象而得之道在杳以無得而明之豈可以積學而求動念而取者去道懸遠故彼邪見者堪笑無依也逍遙抱一豈相差聖人抱守淳一可以為天下式自然品類無差其儀不忒矣方便門開智慧花万法曉了曰方便智慧無滯曰門開得不果證於他年故顯花開於今日神室分形添石髓神者妙用難測室乃藏納有形洪潤流液故彰石髓矣華池巨焰隱靈砂夫迹參洞府心契沖𡨋者可認華池之淺深靈砂之次第也穹隆務實歸宗旨且形動而心靜神凝而迹移者無為也必先肆意於穹隆歸旨於甚深矣釋意從容不是賖高豁性情興懷遠寄陶然於自得之境釋意於混茫之外滋味勿教貪過度夫佳味爽口美食爛腸故道經云五音令人耳聾五味令人口爽必然混世老天涯上士以棲真鍊魄沖虛靜默老於天涯混於物表龍虎剛柔隱聖方龍為鉛而虎為汞剛為陽而柔為陰旨趣玄祕諸仙訣一時和合運陰陽金石之性各稟自然合而用之互有違順若能消息會合陰陽變化之功通乎神妙周知配類無踈失博達精微配其品類纖毫無失其功十全物性從來理自長萬物之性各有所長不可以論辛忌甘好丹非素也鼎裏花開裝五彩金鼎丹成如花爛漫二氣交感五色相鮮修鍊之功驗於此矣心眀火候制三黃三黃者則硫黃雄黃雌黃也純陽之性擒制尤難若依彼神方明其火候則亦可伏之矣更能通得華池妙華池之名何止百數制之在氣功用不同更在沉研以通其妙南北東西不可當功之成矣妙用縱橫掌視四方何往不適矣神仙不死幾人存見素抱朴積德纍功仙道既真谷神不死然洞天遐阻鼇山杳隔得長生久視者幾人存焉欲界從頭是可論從凡入聖無不自欲界而升諸天且修何妙用頗滌塵滓永處清虛事匪常情故可細而論也真實自然歸至理至理淵曠非道不達但虛白其心真實其行則曉悟玄門如指諸掌也狂顛逢見道須尊重為輕根靜為躁君且狂悖者良為未明玄旨正處勞生若見道明真則顛沛自歇故知清淨之理可化不善之人分眀記取依經典老子云孔德之容唯道是從若依茲聖典佩服心腑則衆妙之門必可履踐尓消息臨時度曉昏消息以時曉昏唯寂進退得度用捨合冝矣四敘推遷由反覆歲時不駐所以偱環春秋推遷寒暑然攝生養道者不隨物而改變也唯占日月順𠃵坤日御飛轡月魄輪空虧盈不差𠃵坤自順法而動靜其道乃光也逍遙密化道希夷得理息羈沖虛放曠乃坰逍遙潛憑岡象寂寥無聲混漠無形乃希夷之道也宗習羣流我詠之宗彼玄虛習乎妙道雖探幽賾祕孰窺其元我以詠之令知乎要矣應是有情聽譬諭夫生我者道稟我者神猶性動為情情生昧道今可舉况設諭皆令悟入也莫教虛度悟參差復垂慜誡再示玄虛慮雖悟得性為宗恐不至鍊形為要乃參差之毫𨤲矣深窮動靜冝消息夫動舉靜移去道遠靜止動息乃合沖玄今可超動靜源出有無表窮達要妙消息玄虛也惻隱玄元善所為太虛之先寂寥何有至精感激日之玄元今可惻彼幽隱善所作為終極乎道矣性識更能通幻夢性可以洞神識可以鑒聖丁塵寰之幻夢不溺色聲明妙本以全真何須修鍊恬然存相似生知虛白恬然樂於內澡雪存相潔於外乃形儼性靜蕭灑出塵指万法似生知固一氣為大道也水精宮殿月華眀陽精注云水精宮殿帝后三妃九嬪所居日有九華月有十華白玉為墻火不侵靈寶經云三清聖境假使陽極水災陰窮火運三界消壞而三境不侵八境風高駢羽駕八溟之府諸仙之境玄氣凝結清風益高羽駕爭行駢繁無盡九重天上絳霞深仙天九重赤霞掩映淨色可觀故謂之深物情晃朗無遮隔神仙情性同日月之精英晃朗無遮明然自若非是凡間比類尋人間物象俾不解者可以喻知仙界幽通比類奚及汗漫真遊誰得到洞府幽都神居靈域非夫物外不拘之者曷遊真境之中桂花香潔影森森蔢䓾桂樹異實名花影覆仙宮香浮神闕從凡入聖作梯媒人若通道道亦通人人道相通超凡入聖故必假精修至鍊而作梯媒也紅焰爐深豈易裁夫修大藥者必先置爐爐者鼎之丘郭也當灼灼紅焰之前宛有蓬萊之狀其間仰觀俯察明陰洞陽千變萬化未易裁也點化縱橫名大藥惣五行而合體括四象以成形點石化金縱橫妙用故名大藥催驅雜類謾成灰不達大丹之法者徒以世間雜類催促驅馳終無所益也真鉛即是機關理太陰真精謂之真鉛也機關運處理盡其中矣暗室皆明任衆猜自暗而明人莫能極故衆謾猜也未究前言勞自苦前言之妙乃聖賢之密用也豈造次而明之不達而求之者徒自勞苦也精窮玄妙樂康哉道之至也即玄之又玄妙之又妙必能精通窮究何樂如之而神用康也交結從頭有順違地天交泰二儀相通順之則物類攸行違之則氣候差㸦方知霧散若雲飛莊子云積水上溢故為霧淮南子云山之出雲蒸柱潤礎斯皆積陰之盛也其或陰陽調暢象緯和平則霧之散雲之飛理皆如也超凡入聖含金體抱素還朴儻積德而纍功以石為金即自凡而入聖拋棄迷蒙挂紫衣棄欺幻之術得虛通之門丹田既離於迷蒙紫車盡期於變化細認消停無遠近差之毫𨤲失之千萬子細消息復何有於遠近乎分明意外隱玄機大道分明離於言象超然意慮之外故玄機隱而難見相逢配偶為間事若陰陽和同則氣象諧偶萬彚通變俱不勞神雖庶事森羅而自可間適矣誰解調持得一歸夫天得一以清地得一以寧人得一以靈然則知者雖衆其能調理任持歸于得一之體者誠為難矣昭宣形體思悠然覆載之內萬物生成皆得優遊各遂其性也郍是愚夫郍是仙仙凡雖殊妙道一致顯即登真脫屣昧乃觸事靣墻不識饒教非遠近晦昧其道汩沒於真雖遠近有殊皆不可求其及也誤來何事苦相懸或達虛無之理只在剎郍前念猶自懵然後念杳無鄙隔含容裏外無諸物既達其理靜慮安神內即萬想俱捐外即一物無狀矣象法其由語話詮法顯形象言可詮量語默之間同歸大道品格調高奔世界神仙品格邈乎高尚所以乘雲躡虛遊四荒八極之外也任從他寶四周遷仙都日月難究遐長既得逍遙任從遷改知之修鍊但辛勤修鍊之士今古尤多知之者可以造玄微昧之者無以達其妙孜孜矻矻唯務辛勤苦志由來離六塵然以燒丹鍊石苦志勞神要在鄙棄喧譁蠲除嗜欲六塵既息万慮寂焉金鼎乍分紅焰火庚辛應象成兊鼎以含真丙丁助陽藉離火而養氣輝華紅焰皓結玄霜月魂高鎖碧潭津金液成丹月華流潤高陟煙霄之上深窮玄妙之津深思五嶺凡間路五嶺路𭭛深思遐遠千溪万壑峭拔峯巒未出塵寰俱非聖轍好作三天物外人三天麗境万象之尊脫屣塵寰逍遙物外好真之侶善思齊焉萬里州通寬世俗四海混同九州萬里寬分宇宙通貫遐陬變世俗之澆漓盡淳風之化洽清虛境象善求真海晏河清天寧地肅二儀昭泰万彚清虛既屬良時道冝進取如來祕法諭恆沙夫心印密傳靈符玄授演九藏之奧窮萬法之源林葉不足以比其多恆河可以為其喻須是鉛開汞上花一㕛始生五陰方下花既生於汞上藥必熟於鼎中燒鍊勿令傷血脈夫欲鍊胎易質革穢除腐神形合契白日輕舉者務養其性命有其血脈也凡情散亂黃牙道者至靜為宗精思為用自然神感有靈凡情不亂黃牙自成矣離男合度分明説夫金丹大鼎研味真奧八卦以成其序男女以別其位也坎女和同不用誇四神當位龍虎相逢丹砂必成谷神長在故不自矜失於道體大矣日中成九轉日中九轉十月玄功烹鍊既精名殊次第即湛陰粉靣等也紅漿一飲到仙家道者萬物之奧羣情之望肺腸既沃於紅漿形體必棲於碧落還源根本沓難窮歸根復命得道之常真曰大還全非九轉斯之妙旨沖寞難窮祕密玄造化中養素還淳功齊造化玄開祕訣包括無遺白日昏迷常不見雖曰玄其道明白如日之照本自無私學者迷之瞑然無覩青龍霧曉大家同龍象太陽光充宇內五行有犯如霧昏蒙霧廓曉天無幽不燭故曰大同陰陽表裏和煙碧丹分內外二氣相資交泰混融纖塵不翳如煙一色凝碧虛明天地相鮮似火紅陰陽相契功用自今神光炳然交徹二位如火之盛紅焰晶熒直要審詳知道理差之秋毫天地懸隔未窮玄旨曷望成功丹成千載上升功神丹既就妙用克彰足保遐齡上登仙界甲辰歲高麗國分司大藏都監奉敕雕造
