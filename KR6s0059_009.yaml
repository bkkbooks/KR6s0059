body:
  text: 還元到即見真歸德經云萬物並作吾以觀其復即是反於靜而歸於真淳源既還何所不適不是虛傳羽化飛其道既真其神必靈故得脫屣人間羽化象外儻傳之虛妄又安得御風桒雲飛騰碧落者哉大道勿將閑設用大道汎兮其可左右盖周應物用無所偏名且非閑妄施為得臻至極也精修別得便𭜎機精勤以修方達妙旨便能外其形𭜎其機縱玄黃相鮮榮枯倚伏何有於我哉安排穩入龍宮內結汞以處室鑄鼎以營宅抱陽而居以順其制故安詳穩細庶成其功尓變易終藏虎鼎威龍虎分位水火交養氣類相生變化倐忽道遠乎哉誠可明矣豁達𠃵坤神妙理神妙之理𠃵坤之象雖豁達無際而幽罕測自非理合元和功究造化何能修鍊者哉逍遙鈆汞共相依汞無自成之理金無獨變之道故轉鈆為金化砂為汞魂魄相依逍遙養育自然而然唯聖作則矣鶴骨巖巖混世間夫抱真一靈根之氣者雖鶴骨巖巖居塵無染混然成性陶陶然於世間也不侵寒暑似童顏夫慕道者固精魂御神智噐有陰陽之革形無寒暑之遷自若童顏也精神爽麗言千典黜乎嗜慾隳彼聽明恬澹純素體和神清縱談無據盡契無為者哉舉步如飛思慮閑其翔非翼其動非心彰乎得理無方優游不滯也起坐問他修鍊法雖情向於道而心未洞明即師範有規請益宗旨者矣亂將詞理勿交関苟未達至理者妄陳旨徒引玄於飽氣作仙方以保籙為神要者遠矣生來靜却凢愚見夫稟道而生主氣而形凡情不可聖愚見不可仙今可靜凡情息愚見功乃著矣又說三仙有大還夫望九府之真虛說三仙之秘藥至澄其一乃就大還矣停騰火𠋫詰炎山子母相生陰陽固守一𠋫不差大藥成就是以詰火能生於土為萬物之基故曰炎中九轉方能濟世間神丹九轉至功告成方能愽施濟眾大惠無盡玉蘃花開真可愛琪樹含芳瓊柯吐艶類大丹之潔白美皓氣之凝真紅爐鼎內境幽閑以天地為爐鼎融至道為大藥自然神境熙和萬慮閑默人逢藥就延長久道與氣凝丹與神會道氣混然長生久視羽駕仙迎返少顏同聲相應同氣相求眾仙𨒦之易老為少者矣盡在目前非是遠道在目前如眼有睫雖近而不可見也定知時日好登攀銘中銘曰至道不煩易曉難精淡薄無味一物常雲如谷響應動靜無形超凡入聖䪺覺䪺明泥丸本是命根宮泥丸者居兩眉之開顯處高而正中也朝礼之法以簡叩於泥丸表存神而守中即延命之宮也消息臨時語話通至道不噐上士勤行復性命之本源閉氣味之戶牖以時消息何往不通大道比來行氣術緘縢六志扄鑰百骸儻養氣於丹田必御風於象外此乃大道本來之用也其餘効驗藉陰功內抱清虛守其中正外禁嗜欲行乎好生期仙品之躋陞藉陰功之佐助物情之理皆清淨道通萬彚物物皆周俱生冲淡之中皆符清淨之理造化玄事莫同大地造化真境玄或遺形勞神或尊道貴德雖理歸一楑而所行之事或有不同者哉重此言深可意指修鍊之要門述長生之妙訣此之言教如寶之可重焉腹中日運鼎花空運六氣於腹中丹臺已淨飛雪花於鼎上六藥昇空業就功成不離於陰陽之二氣也無名蹤跡故難興道本無名不皎不昧欲究蹤跡難興探之心矣智者消詳冷似冰達士詳其妙道遠在天地近合人身淡而無味有如冰也廓落異端隨日變修道之云若放曠其志異端其心逐時變動去道遠矣乖違法度受天懲人乖道要凝神而神散養氣而氣濁不絕三尸之仇故受天譴謫矣機關勿使招他謗人之用心動念但自任真或用機関必招物議也亮直溫和自舉升壯志似矢之直溫知遶指之柔豈爵祑為酬或神仙可冀也好事相宗堪䡄範非修鍊得志即經籍自娛皆可宗師永堪䡄範也方言內外一般稱內即遵老氏之玄外乃究仲尼之典誥同源異𣲖皆歸乎一揆天生顏㒵幾何般天地大德生乎萬物清氣昇而生其智濁氣沉而產乎愚愚智非同故多般也鶴骨飡霞厭俗觀松筋鶴骨御氣湌霞道契丹經名標仙籍厭乎塵俗唯道是觀赤水華池誰法則金丹之要妙在赤水華池又云赤水即神華池即氣神氣相保故能長生道本無根修之永固知誰之法則乎白銀為𮤢又堪看丹成道在宮闕白銀紫府輝華群聖具瞻矣來傳音旨俱然混杳之精恍惚之物此乃從來所傳之音旨道隱虛無俱然混也位有尊𢌿勿異端八卦之宮四神之象慎終至始自有尊𢌿一氣而成無異端也逆順之中關理性順之則契其陰陽逆之則背於道德順逆之義関乎真性矣心田靜外豈相干心田既靜諸塵不生道守天真氣唯抱一任世萬緣豈相干也靈草靈砂起自然若夫靈芝內茂絳砂自真何假乎九洞飡霞十洲採藥尓却將非外亂烹煎夫含養之道陰陽烹鍊不在乎五金何關於八石也黃牙成土堪名藥夫金因土生水從金長水土合度藥物万滋也秋石為胎本是鈆貞吉含章與時消息既月華而為秋石用鈆體以為元胎矣樂道逢來折且喜夫人寄情於冲寞達命於上玄怡然自得以遨以遊也周知體認更完全智周萬象道洽群垊去甚去奢知白守黑也陽施陰授冝消息嗉籥萬彚消息陰陽以油知為氣以含養為功故老子云萬物負陰而陽也不識時人在眼前見素抱朴少私寡欲用之不知覽之不見逍遙我命在玄穹既逍遙而廣大知我命以遐長盖動合於天真諒靜遵於冲邈故云在玄穹也鶴宿霞景致中鶴宿幽深霞縹緲養天和而自得縱消息以誰窮雖景致而頗類於神仙實玄功而咸歸於妙道自得安寧兼養道心既適而無累身即安而愈寧道自人隆故能兼養矣更將利益屏群雄始固於身終利於人在至聖以居尊即群雄而自屏淵深引古知今用以今况古將古證今語其道也則至深明其用也則無擁劈斫區分盡可通利刃投虛纖不挂萬機獨断一以貫之故無不通也和暢五音從豁達大樂者與天地同和必和而暢之即五音無爽乃豁達之象眀矣𠃵坤之內靄溟濛陰陽以和人神咸頼天地交感萬物化成所謂靄然無極也溟濛盛㒵巔峯一望水深潭上窮磅礴下極滄溟欲逗機冝遐觀庶類誰解緣情語話堪高談至道亦假緣情堪與其言一何鮮矣暗室自開眀日月遁世養蒙如棲暗室皎然方寸二耀齊明道心奇異老山菴道之高也情乃澹然雖邇色聲自𭜎嗜欲逈超塵鞅如老山菴妙契希夷故稱奇異研窮妙理真消息虛無之道理極幽深若不研精曷通消息誡忌先賢讓不貪自古賢達皆以推讓為先不貪為寶今言誡忌者不令背於此道也稽古尚為今法則考諸古聖作則萬邦民到乎本𠈟之如日月矣愚蒙太甚苦談談是非得失目擊道存智者玄通一言以蔽愚蒙不敏徒爾云云千年福壽自由人周書五福曰富曰壽豈况筭永神仙祿深天爵此盖靈臺妙運陰德潛施在我致之非他人與也萬象星羅𠈟在身萬象森聳若星羅列所以人法天而歸於道故𠈟觀俯察皆由於身也寶馬不教龜鱉乳物以群分者各稟其性也且沠兔不能乳馬况龜鱉之類豈得哺良驥哉嘉禾湏問穀田神食為民天故以豐年為上瑞今嵗時不害嘉禾屢產盖后稷為穀田之神橎植由敘故可問甚根源也根株種植華池內金洼二堂乃華池也若種植道性則深根固蔕潤盈不竭可利萬神也藥鼎煎催運火勻火𠋫既勻藥成有自故假煎催之力立期變化之功尓混沌分來皆是道混沌未判道性莫顯洎清濁既分妙用咸被所以萬物由是而生故知非道而何二儀交感八方親天高也而無私覆地里也而無私載故使庶彙致和八方攸仰睦親之義在於斯矣非人口似瀉汾河人口如川不可暫止易繫辭云誣善之人其詞游雖邪辯而揵喻若河流無所益也此軰塵中有甚多濛濛六合之內櫌櫌塵埃悠悠天地之間豈知道德也心恨㒵恭無定止㒵雖恭肅心多佷戾動與道乖故無定止舌誇端正乱乖訛華詞不實端正自誇愈致乖訛終無所取為官善政身榮祿受之以爵命之以政身既榮矣祿亦多矣利劒休教石上磨神劒之利非假淬磨至人雖賢亦湏任用立待滿盈舡䧟水人道𢙣盈天何可欺如舟被溺抵掌可待惡風從被海神拖且鬼神𡧱盈聡明正直故以惡風寄怒懲勸於人也精詳語議四門開夫修鍊大丹必先精詳語論竆乎四象所謂青龍白虎等四象之門也舒慘陽和意外裁陽舒陰之象剛柔伏制之機意外品裁見乎精鍊遠見風塵思往事竆修鍊之至道見物外之風塵先達可觀堪思往事無窮日月去還來精純功力無弃光陰不為日月之遷流從任四時之還往樂耶栺趣歸三體妄修傍通之術制伏鈆汞之徒指趣俱邪盡歸三體三體者白金黑水之流也周旋道理遍九垓虛通真性窮達玄源道理周旋九垓咸遍廣雅云九天之外次曰九垓賢聖人天常法則夫大道有常為物之凖也是以賢聖人天莫不皆依至道用為恒式𡖖雲嶺上白皚皚天一爐開玄丹功畢高昇仙嶺類彼𡖖雲飛騰自在莫教鍊彼金膏調茲玉液雖飛輝騰彩自在相鮮而勿令蹤跡有遠也坎女离男共一家九還之妙七反之門太陰以坎女彰名太陽以离男標位既長養發生之道無外是曰一家矣無礙逍遙通智慧盈虛消息動靜旁通無礙則隨機入妙逍遙則觸類資玄故咸通於智慧也將求利樂勿湏誇夫體道居中凝神太極本期利樂於世寧湏誇衒於人靈根就看和春雪萬化通神靈根儼若𡨋心大鼎就看孤摽舉體輕明宛和春雪神室之中有絳砂丹品鼎位神室在中一九氣以精統三才而益著故能成斯上藥就彼絳砂彼是彼非堪可重道無所是理無所非是非雙遣何可輕焉常娥倚樹笑唅呀仙桂搖輝常娥笑倚頗盡逍遙之興實由至藥之功貪染猶來理不通道性清淨體本冲和或貪染於聲塵則於理而多擁矣虛勞嵗月面西東調元養氣随陽順陰若躭染之人功積難就徒勞嵗月面於西陰東陽者焉從前自是凡心別淳素之元本周萬物迨從太始寧起塵機只於無名之宗倐起有象之解乃從混朴自起凢心利益湏歸上帝功變浮囂之性成神妙之功沐浴玄風利益群品超凡入聖實上帝之力也洞府名高同景致神遊洞府名在丹臺飲沆𤅈之精居逍遙之上朝遊夕處景致皆同塵泥蹤跡莫知空存濁滯滓不果輕昇跡既混於塵泥心豈達於𡨋寂去非但向鈆中作去非以存是弃偽以㽞玄澄神但向於真鈆久視自符於至理也變化飛騰大道雄變陰陽以在𠋫化鈆汞以為金丹砂赫赫以飛騰大道雄雄而𡨋契者矣達道真人見者稀慎內閇外以金液灌身謂之真人浮世之流罕得值也豈教容易等閑知蜉蝣之者以智自燒以明自賊杳靄妙旨豈容易知乎陰陽造化無非實金母為女仙之宗陽為男仙之主挻埴萬彙成實形象矣天地元精動合冝玄功歸一萬物生焉易曰天地以順動故日月不過而四時不忒也功行三千湏及物陰德廣施功行及物自然動合大道通杳達𡨋矣還丹九轉上昇時還丹者建寅之辰自子及申七返九還功畢而成丹也得之昇仙矣忙中嵗月忙中遣流年迅速疾若隟駒鍊志清神以道消遣也我本愚來性不移深藏若虛盛德若愚盖稟性自然老子曰我愚人之心純純乃不移矣拪心隱逸故非常夫欲拪其心藏其用或山或藪或市或朝任性陶真放情隱逸跡異鄙俗故非常也大約恒持要久長大約守道庶乎養神務在恒常任持逍遙其性匪徒旦夕貴在久長清淨好為皆是益離塵絕欲息念拪真道契無為皆順清淨而能愽施濟眾善行無轍也周旋理度審安詳生成之理䂓矩之度原始要終唯務周旋審安詳也法𠃵馭物湏平穩法天作則體道臨民翼翼小心兢兢馭朽既齊七政則平穩矣順日成功自酌量成功順日鑒物無私道在向眀勉而自酌倐忽之間堪疋配倐忽變化疋配合冝存之養神而合於理臨時巧拙見圓方夫慕道者隨其方而任於圓逐其巧而順其拙臨時制遏可不明哉香湯沐浴更齋清大藥將成至靜為懷齊沐為務向星壇而稽顙端玉簡以凝神運動形軀四體輕若屈伸道引消息神氣必真目於玄関遊心於無外也魔鬼自然生怕怖一㕛始生八卦既定神室密靈於內秘丹臺已継於仙名何魔鬼之不驚也神魂必定轉安寧夫將躁制之以寧將邪閑之以貞將濁澄之以清優哉游哉不欲不營從無入有皆真實必若怡心𢬃制所恱靜默元和抱一者是從無而入有務實以去華也去住何難妙㝡精陰氣盡祛陽靈益著則神妙無方然後絳宮可往赤水得游尓五行聚散歸一體且陰陽混蒸以主萬物散則物物皆句聚乃㸦相涉入靈源不用苦煎烹士有烹金鍊骨鶴宿霞棲者殊不知內養靈丹外固華池者也一身獨善欲何之或棲土窟或捨風瓢唯務叩虛𠕀思兼濟優遊卒嵗亦奚以為爭及衣解撫綏豈若跡脫塵泥身榮簪組上弼諧於皇極下撫育於蒼生名耀簡章傳乎永世浮世淺情無限量悠悠塵俗溺在勞生向道之情率多澆薄則知迷者邈矣無涯愚蒙自是不相䂓親仁善隣國之寶也而愚者自用不能思齊如玉不琢不成噐爾直須憑仗分眀說民之未信化之未至是以聖人垂訓令發蒙於庶品也詰取靈源問得知靈粹之源天真自性賢愚貴賤一以貫之未遇發揮莫知其妙要覔洞中閑日月若不虛心合道與物齊真欲訪洞天別求日月𭜎源逐𣲖不亦迷乎除將濟事謾非為上善若木水善利萬物苟非體道生成康濟天下者皆非聖人之所為也尋思道味詠吟哦道體淳和養月正性既非覿覽而可求但且吟哦而寄詠矣去住先賢有幾何在昔賢達之士去者不可追住者有其幾於去住之間得道怡神演暢情性者又有幾也性識無凝関要妙飄風驟雨或終日不息則傷尤甚亦如學道之流執滯言教則虛無莫達今既性識凝寂何要妙之旨而不通曉哉浮沉依約不言多道源澄湛不隨物變今或心徇浮沉情無凖的依約有之便違妙理何必更言多也但將子細分眀說天何言哉四時行焉萬物生焉而况大道至非言不顯故假子細披陳指其玄奧布於耳目也猶恐閑非却被魔魔能敗正非能抑是唯妙本眀白皎若丹青而誠信不堅追悔或有也救世比來心所願真人御世心存拯物所以恒守雌靜務在含育致百度惟貞萬彚咸若尓逍遙盡入扣玄歌扣寂課虛冝詠逍遙之理全真抱一堪栽玄妙之歌豈惟動天地感鬼神者哉鈆汞丹方不謾論真鈆真汞乃造化之精寶鼎金丹豈容易而論也同歸一體有玄門然藥有千宗而同歸一致事通百累理極玄門玄之又玄皆貫乎道也剛柔產取黃牙樹陰剛陽柔內外相制仗水火之二氣固天地之真精乃產黃牙成其寶樹矣遠近先眀赤水魂遠摽外象近指內精漱玄液於神魂要先凝於赤水化質昭然清日月自始至終從凢入聖變無名之魄成有象之形昭昭然同日月而明著矣縱橫無礙杳𠃵坤妙用無方縱橫莫測杳然𠃵坤之內變化陰陽之中寂兮寥兮非神聖而不知龍吟虎嘯真非是龍虎相從風雲㸦起氣象符偶感應道交曰是曰非皆不離於相生之道也霧散雲飛似雨奔陽陰𠋫足天地爐開赫弈丹砂倐忽而就若雲飛而霧散似電走以雨奔者焉甲辰歲高麗國分司大藏都監奉𠡠彫造
