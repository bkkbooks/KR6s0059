body:
  text: 逍遙心自樂物物自如心心自樂澄神合道常履坦途清淨保長生五塵不可玷乎志三寶莫可差其功廣大至人長生久視至道歸玄理通乎萬象皆自精誠歸乎又玄眾妙咸處真空造化成真空無狀造化無形雖云有成無物之物輝華揚日彩納少陽之氣延永久之身身存道隆輝華不忒偃仰順風聲消息至虛之元體乎澄湛之本元本既彰風聲益順裏外有何物至真空寂無跡可求表裏俱無古今為妙剛柔鍊始精柔勝剛弱勝強柔弱之道似水攻堅知之修鍊目合淳和精真之道矣遁跡深巖谷士欲幽棲林麓弃捨榮名絕乎嗜慾亦在消息靜慮探賾玄微而已身閑未是閑脩然自適憂樂兩忘絕緣慮而性存雖形沒而神在真為隱者久視長生研窮堪語默尋波計源窮理盡𪫬達冲和之道釋紛擾之境逍遙自得寂默重玄寂靜杳間寂然無聲淡乎無味在杳冥之間出冲虛之際視之不見𦗟之不聞秘密逢邪見消息大丹秘密真誥隄防邪侫止絕閑情者矣難開大道関六靈橐籥域中関鍵鑒混茫而難見先天地而更玄也金丹無効用九還七返陽數陰精差之一毫失之千里也弗可返童顏朱顏易往緣𩯭難追大藥既虧何時再返金鼎精湏鍊金丹之鼎法丘郭之象也中有神室密運五行若不洞達精微則修鍊之功必無成矣華池水火紅華池乃還丹之名也從陰鍊陽故言水火神光燦爛如焰之紅坎离能匹配坎戶之水离宮之火或迭居上下或加減重輕消息有宜功成既濟男女自相逢法度無失功用乃彰坎為中男离為中女相逢之義也曩刧知因果奉道之士若非宿世知修鍊為因神仙為果生生無閒勤而行之茍有所聞莫之能信生前道不窮既能拔俗㱕真易老為少如水之利渺然無涯不宰之功後天無盡矣若修方寸是心之正也則內省不疚蕩蕩焉則何憂何懼尓發意便周通動其機則萬化安所謂周旋通達何往不臧也修鍊求真一道在精修神由至鍊則靈寶真一之妙亦可以虛己而求之冲和本自然雖道躰淵疑名言之所不及然究其用也似或存於冲和盖本其自然耳希夷光滿月聽之不聞謂之希視之不見謂之夷達此之玄者則神光瑩徹表裏洞明猶滿月之當空無所不鑑者也響應直如絃道以虛而應如谷之赴響也聲有大小隨而荅之故無私矣則其直也如絃哉苦學周知易為學者日益必克勤無怠周知物亦未足以為難矣難窮語默玄夫能為道者造次必於是也至若一動一靜一語一嘿能盡其深玄者即未易得也成功兼積德抱朴子曰若德之不修而但務方術者終不得能長生也是知動有成功者乃積德之久矣別有洞中天神仙洞府妙絕人間日月煙霞超然殊異故云別有天也一法從何有一法者大道也欲究其元始明其旨㱕故云從何有也二皇五帝前胚溥既𭎋妙道隨著所以三皇得之大朴不散五帝用之淳風不蕩若論五前則象帝之先也周知多異境智周乎萬物者其惟聖人乎故能識於未識詳於未詳况異境奇狀豈不能窮覽哉猛利要精專求道之士若救頭燃心猛志專事無不果也我命湏依道順天之化依道之本是以樂天知命故不憂語云至於道據於德也陰功及物緣情忘取捨恩被親踈博施勒陰功漸著慶延百世可驗格言善心通感應心同絃直志類霜明見善尋遙逢𢙣即改積累功業感應玄通也動靜理深玄其動也直其靜也專既專一剛正深玄之理自然符契矣日照光文彩日者實也太陽之精照灼萬物光彩燦然也周通無不関周於四荒通其八極徧該動植無幽不燭者矣天思功㝡大天有普覆之德有下濟之明不言而化恩莫大焉地載莫𠇲閑地者易也能載萬物含吐應節春生秋成莫可𠇲閑也絕頂孤松老松生絕頂勢逈孤摽枝屈虬盤不測紀極者矣飛雲野鶴還飛雲搖曳野鶴徊翔觸石生而無心仙禽還而遂性也玄珠名隱奧玄珠強名以况道之體隱奧而索之得乎罔象者矣杳靄路𭭛間杳靄妙理恍兮惚兮𭭛路之間無而似有也清靜常清靜解心靜神返照正𪫬故曰清靜天真之性動而恒寂故常清靜矣緣來盡可行時之得用湏俟緣來緣會既符盡可行矣道高麋鹿性道德內充混然無際性同麋鹿曠蕩自如矣庸識歲年輕賢智之學不貴尺壁以競寸陰庸識輕浮虛度歲月飽食終日無所用心日吳相依勢月盈乃虧日中則昃東凝曉照西暎暮山事往時移勢類相依也花開觸處明春陽煦育花卉鮮明體道生成光輝萬物也是非論巧拙性有賢愚情拘巧拙是非究理玉石方分達外福蒼生達乎道悟於真非唯利濟天下抑乃福祐蒼生真境堪依仗外遺塵幻內守真境存實去華誠堪拪託矣周遷四敘移四序遷移歲之恒也一性凝寂道之常也徒感於俗無関於我哉人忙閑聖跡人務有欲但自駈忙聖惟無心孰尋蹤跡心達罷狐疑心了本一得旨忘機豁達無疑絕諸凝滯俊造皆流品俊造摽彼通明流品指乎上士乃上士聞道勤而行之逢能即是師學無常師惟善是從其或得理離言則不貴其師不愛其資也二從寒暑變一氣既變二儀隨生寒暑以之往來陰陽以之運動矣龍浴鳳皇池龍躍在淵如浴於鳳池也此乃交感成象變通以時保含光大也戶牖常開閇天地戶牖開閇有常唯聖人則而行之無所怠矣升沉倐忽中得之妙用可以升騰失於品量即有沉滯但在倐忽見於升沉龍吟深邃理龍吟雲生感應斯至交搆之道其理冲深非造次而知也虎嘯語言通虎嘯風至影響相符垂此語言訓之後世達斯妙旨可謂通人南北思長遠离火坎水調候以時在積德而累勤方功成而事遂是知非成於朝夕矣東西道不窮日陽月陰倚伏之進退有道要妙無窮炎光𠬧月魄炎光陽也以剛為德月魄陰也以柔為用若剛柔相恊必其道可濟矣桂樹發花紅始於入法終至成功當月滿於桂花乃神丹而已就者矣鼎內蓮花出彼美芙蓉之狀出乎金鼎之中芳馨可觀愈蘭勝藍如塵發絳紅玄塵細鼓猶朱類丹輝煥難方清神駭目坎鈆將匹配陰水相容真鈆同致二功特立大藥告成离火好相逢脫落凡胎功猶离火不期而會善莫大焉陰散何優劣至陰雖散至陽獨成何劣何優任物為象陽歸自合同一陽既㱕大丹周用二理相湏如魚與水消停方可信先稟至神次修至藥神藥同功篤信明矣輝華大道雄法天制度法地鍊成妙道既雄輝華赫弈矣青龍本屬木東方之位木德居尊從陽以求之配龍體而為象也白虎作華池華池之妙河車之能位配西方德隨陰數真金丹之得就湏白虎以先行水火恒為則圓曜金鼎二氣相湏既坎离而合配亦水火以為營故丹經云离之火坎之水得九二之名陰陽造化遅日精月魄造化功玄暑往寒來行度遅速故黃帝內丹胎息訣云陰藥疾急陽藥性遲疾緩象日月清心常積德澄慮其心積修其德虛極之本在乎玄妙矣凢眼豈能知淳元妙用神丹功力离婁之目不能見師曠之耳弗能𦗟豈况凢眼乎君子𦗟吾喻君子有德者之稱斯謂凢求道之士可深思之也神明勿闇欺夫神明之道至幽而明君子之人不欺暗室又况於玄妙之至人哉萬靈通有感聖人之御宇也必法天而行道則廣無不覆幽無不燭万靈皆被於玄化則何有不通其所感哉臧否在名人知人者哲所謂名人何則以人之所為皆能優劣其善𢙣無所遺矣志誠昭明德志莭誠實之上雖韜光遁跡如畏四隣而如玉在石澗發于外不可隱也清淨見於真人之所以昧於道者皆由六情濁乱故也若能存神養素消落塵慮則自然見於天真尓奉道惟恭謹道者二儀之母萬物之祖是以奉之者在乎謙恭而廉謹也故老子云萬物尊道而貴德修持願本因養道之士以願為因所謂窮則獨善達則兼濟夫如是則可以䇿勤而進業矣廣將求利益利之廣大者莫若乎不貴難得之貨使民不為盜則自然其嗜慾反乎淳朴也苦樂救生民聖人不憚勤苦而樂為救民也如大禹治水而手足胼𦙘矣頂戴尊天地天不言而四時行焉地不言而萬物生焉以其自然之理而人由是生斯亦恩之大矣信之至矣頂戴尊重之極也𦖟明識見高耳之不聡則聽之不遠目之不明則視之不長既聦且明則識見全高矣所以妙盡希夷玄超形器也無為通理性無為而無所不為則可以通乎太上之理妙一之性也猛利豈虛勞猛利即勤勇之謂也故上士聞道勤而行之則無所不至矣內則適性有餘外則對境無滯以道而勝豈虛也哉出沒終難認或隱或顯何慮何營始則周流言虛終乃旁通萬有可以神會不可以事求欲乎認之不亦難矣因緣不可逃夫人大則道大人小則道小是知道也者因心之變緣力而行鷃止鸝飛各當其分猶形之生影似谷之應聲誠不可逃也中原多聖境中原之境其大也哉故上聖以居之至道以處之若覩夫聖人之事跡固亦多矣四海湧滔滔一人居域中之大萬方行淳化之風自然四海穆清滔滔然朝宗於萬𣲖也世界諸方聖聖人者居無方道無在周流六合出處八紘以利於物也如同在眼前體道存誠造次於是然而求之則往往而求之則遠惟其了悟常在目前矣其於通要妙要妙既通於理必達義味資益其道日新便見理深玄玄樞邃密非悟不明妙域幽微非道不達得其戶牖方可優游法教窮難盡㽵老之教玄元之法雖淳一之道大同而應變之方無盡也周知本自然該通物性周察時機始因探𧷤之功終曰自然之智矣信誠含萬象信能薦鬼神通道法既微及於豚魚故包含於萬象尓秘隱口親宣老子云其精甚真其中有信此謂感物必應應之不差元聖格言誠哉秘隱也隨緣心不見修道之人隨緣任運凢人揆之未見其心矣性各本來真大鵬至大蟭螟至微其間性即各遂其冝真乃本來無異也𢙣事誇脣頰弃善逐𢙣見利忘義庶事爭衡騁頰舌之詭詐矣愚癡似醉人見如窺管情若守株玄虛𠕀知慈儉復昧兀兀懵然如醉者也忙忙何物有逼迫塵世馳競尋常𠕀知恍惚之中豈究虛無之妙也急急利名親流年急景貪利親名違理執言而背於道也入定觀浮世入根本定以天眼觀見瞬息之光陰愍蜉蝣之忽者也蒼生業感因蒼生眾生之謂也各修善𢙣為因遂致業報差別也善念銷嗔恚上善之人用心虛靜柔服以德嗔恚自銷也無差本自然體自然之道保天真之氣不屈守中行無差矣花開凢葉木開花結實何湏𣏌梓之木達道證真不必才能之士靈芝無根足為瑞矣水打急風舡性以情而動舟因風而蕩觀心未寧因物而起也拘執恒如縛執言滯相㝵有拘空如鳥繫繩終難騰翥矣能仁斆昔賢夫行仁立義事冠古今君子之道見賢思齊神明皆正定聡明正直故謂之神止乱澄神靜定通矣消息更深玄妙道音徵目之消息究極妙用其旨幽玄矣逍遙賢聖樂達理優游任運不滯賢聖縱別逍遙且同樂哉至仁放意自得也我悶俗情愚浮淺之俗既顓旦愚聖人愍之故發歎也鄙俚何堪覉褊寡識露才揚己無所取焉何足尊也斟量解卷舒用智度物得物之情卷之則微舒之則廣此明聖人扣寂縱橫得用豈鄙俚之俗所能哉𢙣緣湏盡去𢙣之為緣敗正毀德儻盡指弃何往不藏善事好相於以善為道唯道是從而智者行之時不可暇誠乃相於也忙急真如夢務欲奔馳時不暫息以斯忙急實猶夢哉𠃵坤造化殊覆載為用曰𠃵與坤變通作程曰造與化雖道㱕一體而服且殊途宿願通賢聖宿昔立願向善去非心路坦平理通賢聖貪心勿強為不貪為寶少欲是但能節用愛身不可強為放縱也眼前銷𢙣趣守行益物以日繫時只向眼前可銷𢙣趣天鑒故無私皇天無親惟德是輔賞善罸𢙣故無私焉如夢何光景浮生如夢光景急流宜惜寸陰以利及物明神所在知此地他界神明恒隨如闇室之不欺知精誠之不昧也精修觀出離精克之心修鍊之行觀其功滿出離凢塵解脫影相隨功行內就力用外彰入聖超凢理無虛擲似谷傳響如影隨形者焉不爭多氣力且夫道以善下為功執柔為本故後已而身先不爭而多力也容易可成功玄解自知靈域非遠不勞勤苦而茂業可成意馬湏調伏意識狂逸類馬奔馳觸境無窮必湏調伏如塵幻夢中意識飛颺亦猶塵點俱處虛幻夢𥧌之內得不猒乎任持從雅淡委仗至道任持性情使染汙䪺銷樂諸恬惔樂道定雌雄不為妄惑樂道見真定彼雌雄以分優劣故尺鷃大鵬各得其所修鍊知勤苦功崇惟志業廣惟勤勤苦自知趣道非遠因緣自合同以知道為因以功行為緣因緣和合道猶神速矣一受諸同氣得真一之道應陽九之數含虛孕物結氣朱英故云同聲相應同氣相求水流濕火就燥凞和理道平久飡元和徹去滋味神清氣爽凞然靜息可以知雄而守雌也乘雲無滯礙谷神不死久視長生可以玉華前導芝盖後隨乘雲氣馭飛龍以遊海外也大樹種而生一爻始生見牙之兆功如種樹法若造基故老氏云合抱之木生於毫末也塵垢勿教染還丹經云至藥既成自含種象方得通靈徹視今古鑄之為珠名無價如意寶珠塵垢不染江河順不爭海以居下為百谷之王道以無功為萬物之祖萬流順㱕而不爭至人寶之而逾密也機智潛弃用夫泊然清淨天下自正而機者道之小巧智者聖之外用故㽵子云弃智絕利民復孝慈方顯貴佳名名者德之華德者身之實然道之於物取無名之名貴無德之德
