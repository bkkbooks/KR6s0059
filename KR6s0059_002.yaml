body:
  text: 人救眼前凡情處世以近事嬰心逐利眼前未知於道矣何曾利益心背彼至理沉滯常情既無向道之心豈有利他之行愚迷終淺見顓愚昧道於理不通縱令誘以義方終成浮淺矣達者智高深達士之智得用不群妙出希夷高超物表矣苦行須知應夫聖人之道誡欲持行𡨋契玄穹所謂作善降之百祥作不善降之百殃報應昭然若影響尓餘憂力不任非常之人必有非常之事若非其流則憂不遠故易云力小而任重鮮不及矣經書無限意古先典籍百王之道其意萬殊志在乎導生育物者矣稽古便同今夫聖人者見真素抱淳朴乃稽古之道以御今之有也逍遙安且定放曠自得是曰逍遙方圓不違安而且定但信莫懷疑優游之旨信者方通但執之以心誠莫懷之以疑慮大海波中水滄溟浩汗渤澥渺瀰雖巨浪以滔天亦任真而自若狂風樹擺枝徑風鼓怒大樹根搖任動息以不常乃隨緣而無矣樂天分造化樂天知命秉正守中澄間適之本源分造化之深力慧眼細觀之究升沉之要道達真假之本根慧眼明觀無細不鑒矣方寸無諸惡積善於心仁者之行是以方寸之內不苞藏於諸惡焉恆將利益持夫利於物者是聖賢之行故天道福善鬼神助順欲久而且長必常利益於人則任持可久矣恍惚人難曉恍兮惚兮理越情外無象之象故曰難曉天仙語默玄真人契理通幽洞微體語論以忘筌處救默而咸妙修心無道理夫欲修心息慮而背真常則於道遠終日自忙然依道川心者則終日必成專已師心者則寸陰虛擲也我命真中趣稟天之命依道之性旨趣咸真逍遙自若長生認宿緣躋夫壽域以久以長若匪宿緣曷致能事機權饒使用夫遠道者至於無為機權之智何所用哉聖事不虛傳動必全真開物成務聖人之旨豈虛也哉清虛間靜得妙本湛然寂寥冲寞視之不可見聽之不可聞斯得道之真體故老氏曰孰能濁以靜之徐清也奉道見真歸道者虛極之稱妙用無方故澄湛內心精潔儀軓必觀乎真妙尋乎道源契合皆堪用夫神明之本天地之源其大無外其微無內契會有方應用無竭者矣因緣事好依因緣生發原始反終依真淨而得契無為而成也精誠求諦信精思諦求神凝感徹真應功成可以左馭青龍右乘白虎者也須有是兼非自澆淳散朴大道不行是非競作聖人統而化之和光而同塵也豁達幽深遠同流六虛傍遊無外斯可尋道之源觀道之用也奧妙入玄機探𧷤索隱鈎深致遠窮衆妙之門入香𡨋之際是謂玄之又玄清靜人安樂人之所以多憂患者背由嗜欲之不節勞慮之未息若能染除情染令神氣清淨則自然安間而恱豫爾恆持要久長夫為善者靡不有初鮮充有終若守清靜以為恆德久而不渝則可以長保其元吉秋天澄皓色皓氣充乎內也則如秋天之色淡然而虛自矣春日發輝光靈秀發乎外也則如春日之輝藹然而滋麗矣一氣從初立冲和一氣亭毒萬類考其用則造化之權輿也原其體則恍惚之精真也所以至於道者在乎抱一而已三才位不忙三才既位四時乃序生死由乎天榮枯繫乎命則埋不可以速而亂其常人不可以躁而濫其進也群生如似夢擾擾黎元孰明虛幻為色所盲為聲所聾同莊生之化頰鄭人之失度得非如夢𥧌乎甚處得馨香人不知道則觸逢成滯至于歿齒無善可稽則馨香之德無所聞也道者強名立道本無名強名曰道既為萬化之祖爰開衆妙之門始一氣以混成終三才而定位觸類而長何莫由斯清虛隱顯深清虛之理隱顯相生彼我玄同逍遙自得欲行千里路千里之程起於足下萬殊之變唯道是㱕別探一般心真一之心玄之又玄以其無為之功大也雖日用而不知是得言乎別探矣斯亦強而名之景象空天遠景中之景象外之象邈彼真空明茲妙理其或懵而求者猶天之遠安能及哉何勞意馬尋既昧真源徒奔意馬沉劒刻舟勞而無益玄談通智慧極玄妙之談本智慧而通也曩劫至從今夫聖人之心憑智慧之照得玄元之妙用悟虛無之至理則曩劫至今不為遠也𡨋搜多景趣搜奇抉異景趣滋繁雖馳騖於襟靈亦未乖於冲默悟則䪺神清形者神之宅今既體道無外悟物非有不皎不昧寂兮寥兮清思阜安頓超塵纍矣拘束終難得德量曠然若其空谷者方可希夷情性煙霞儔侶未有尚拘世態觸類成滯䔬遠於道得非難哉冲和入道情大道之體本乎冲和俾之純純若嬰兒之未孜也知微通理性精義入神以致於用故能知微知章會通理性窮於妙本矣滋味好研精研精覃思探味道法行之不怠轉益清虛尓妙用天然法理自玄應生之無主雖修鍊之門有諸而自然之用顯著矣陰功蘊大名聖人得道之妙也功侔造化息被億兆百姓雖注其耳目而日用不知故能成其大也氣類須相假二儀氣分萬類萌漸皆相假借自道生之陰陽造化成陰中有陽陽中有陰自然之道變化之理以成於功也離凡知有聖得大藥者還神固身玉髓金骨名繼三清列真人位矣得外更求精雖得玄元之道更須採托精微有無相生為金丹根蒂也先祕庚辛理至藥假陰陽含養以白金為始是以聖人祕而寶之後傳戊己名土能生金王於四季雖無正位用且不窮子母之名傳之有自矣真鉛歸一體玄功歸一萬象始生妙用通靈而㱕大道也交感自長生金丹應日月交會感四氣循環成而得之證長生久視矣天界殊勝理三天之界既在杳𡨋之際仍居𠕀象之先究其理者則超然殊異勝絶不可得而言也凡愚不易知仙凡路隔愚智道殊故三天之理未易知也曩因誰可究鍊行之功動乎生劫不知其道從何所生浩博先因其誰可究淺近故懷疑圓穹之廣滄海之深窺管井蛙信之𠕀及是知淺近之智故懷疑也的實歸真性去華務實返朴陶真萬變雖殊可以執一而御之故歸真性矣區邪入正持行無私邪情絶貪欲故聖人取含受之腹去妄視之目執持大象善入無為樂耶親大道無為之樂體乎清靜除察察之政化淳淳之民故萬物歸往也報應自然之契玄妙之功達自然之道迹超物表應用無方矣知之修鍊法知彼聖道理極冲虛乃可修持法之為則矣便是聖中人達其修養之道可以駕鶴𩥵鸞陰符云知之修鍊謂之聖人有象虛無境有象曰形虛無曰理是以聖人垂彼有象之儀用顯無極之道矣邪緣不見真群動妄垢奔馳幻邪恣彼嗜欲之情不覿真一之理矣恆持功行益夫至人者每自保守積行可持乃務日益之功以至無為之道響應甚平均功濟道著其行必均若谷傳聲應無不失渾然天地理道者混然而成乃在天地之內故道經云有物混成先天地生大道遍𠃵坤希夷至理其大無極况乎二儀不亦遍矣伏藏終不見至道幽微離於言象視之不可見聽之不可聞有如伏藏難以觀聽者也巧拙是兼非天賦其性道且不違或巧有機關或拙多魯鈍若非若是俱在陶鎔至道光懷古至真之道亘古亘今欲慕而行者則懷其昔而師其道焉周通隱聖機智周萬物曰聖不滯一隅曰通聖人雖觸物周通而尚隱機於所化爾清天何物性清氣為天自然之理於彼萬物何所滯其性乎濁地故相依濁氣為地性本如然陰陽相符故可依矣修鍊真堪惜夫修之於內身則感之於外氣澄澆漓而歸淳素息嗜欲而保長生在修鍊之門故真堪愛惜矣踈慵有順違道體恆周木無近遠若踈慵而不奉行者乃有順違之事焉夢𥧌其中物以汞入鉛存未辨髣佛之狀其猶夢焉常人何得知真人至術遠俗出塵凡庶之流安可知也陰寒三變極陰之氣制伏餘力不自由三皆變故云子水一午火二合而成三者也陽暖兩相冝陽性剛暖能生至陰二氣相冝大藥功著矣宿世終皆有慕道求真背塵離俗若匪宿有妙性何能知乎長生者哉無緣勿強為欲臻至理必藉階緣儻鮮宿因皆為強立也真鉛歸至道借鉛為母丹成鉛謝靈汞獨存㱕乎至道尓龍虎笑華池陽龍也陰虎也二物共為變化神水華池妙道備矣形影隨人得聖人取象考績玄功成陰之形取陽之羽客隨之久而挹持故冲虛經云形枉則影曲形端則影直也精修道不迷上士欲吐故納新怡神鍊氣所尚冲寞扣寂玄關徹視聽於希夷肆間情於惚恍也研窮深理路唯恍唯惚物象難求香兮𡨋兮至理淵深其或研精而覔探賾而尋亦鮮得矣造化隱端倪太初之道真一之源權輿天地茂養萬物不為長短之相生直為有形之類母雲引龍吟雲行雨施龍吟霧起故易曰同聲相應同氣相求也風生虎嘯溪雲既從龍風亦從虎矣少知愚豈解夫希夷之理易象之微聰明深智方乃探𧷤豈愚昧而知也南北與東西且顓蒙之輩迷於方隅亦猶終年戴天不知天之高終日飲海不知海之闊豈可語道之玄妙乎燕雀不生鳳修鍊之法品配有冝氣類不同枉施功用譬夫燕雀不産於鳳皇矣陰陽一氣全陰陽舒雖分二位同本大道而得發生故皆全於一氣也無窮深可及道之為體也虛而無極妙而至深無以迎隨超乎視聽若存神以叩之則亦可及也境象理推遷在天成象在地成形而晝夜運行寒暑代謝間不容髮皆自然之理奚益其形化百歲光陰如駒過隙隨化如遷理之常也欲固益其形骸者非道何以哉平章語默玄修養內丹商較至道或語或默皆叩玄關終身何所伇土之為道也苟能達其寵辱知其止足則可以優游度世何勞伇之有哉道本豈私焉至理坦然本無私徇群情逐物自背天真則知迷悟在人非道使之然也自在無拘束精通靈而感物神動氣而入微自然而然無在不在道之行也一以貫之若然則復何拘束哉逍遙裏外安得逍遙之妙者緘滕六志所以養其內也扃鋿百骸所以養其外也內則精神冲淡外則血氣平和是得表裏康矣頑情終不見凡人之情不能固其形存其神者終不能見彼長生之術也聖境類乎端端謂端倪也莊子曰和之以天倪斯亦聖人窮神之絶境矣類此一言旁該萬化機智將何用既道有端倪乃自然之分也故聖人立法導民之心各使自然必背之者非也夫如是則惟機與智將焉用之幽深大道寬道之大也幽而不可見深而不可取然為萬物之宗是得言其寬矣區分能解意近取諸身遠取諸物區以別矣分而析之則可以懸解逍遙之旨也四季一周看節宣其氣動靜合冝信一指而有徵雖萬機而無擁至若歷周四序曠然自得因時之妙愈有可觀求得真宗一抱守淳一冲和乃全為道之基養育由性故得一之理契乎真宗也深知萬象清覆載既廣萬象居中既曉真宗遂能齊物紛紜異類長短相形各復歸根咸資於道自然通感應陽唱陰和感召自然成物之務以通乎幽奧者也意外別長生羽化脫從之道在乎意出象外跡離區中不為物拘自陶時數何長生之理不明哉斆古身何措效上古之風守知白之道舉措合度雍雅以居不怠行之愈加光大輝華日瑩眀法道崇德立身揚名若果日麗天輝華燭物洞然明瑩也誰窮天地理清濁異立剛柔不等法而象之體而制之窮其根源者其唯聖人乎去住兩無成陰陽既敘𠃵坤並列或云彼取此則物無成功若俯察仰觀則道何全濟蓋造化交感去留無象也不醉迷如醉修鍊之者不考五行之精𠕀究真一之道不授訣於至人如迷醉者也猶貪巨鼎扛九拔之金鑄鼎象物非可移也令貪而扛之愚而舉之蓋不度其力自耳其咎也通玄求得一既通玄達妙曉天清地寧欲資妙用須假得一之道矣清靜更無雙至人皆清目淨耳絶學無憂抱一守一蓋無雙也鸞鳳拪瑤渚鸞者赤神之精鳳者九苞之瑞衆鳥所宗非瑤渚玉池而不捿止亦由妙道非至人而不得也天津𡑅漢江銀河亘寥廓漢江貫吳楚洪源長流所潤深遠矣欲窮何所似欲究玄微將稟本末乃以比興而寓言之夜月透雲窗良夜將深皎月如晝透雪入窗照有餘輝喻知道之明也利鈍猶根性利也本真之性益其明了鈍也執言滯教動合於俗斯乃根性淺深迷悟懸邈無緣枉用心無宿昔之緣背虛無之理雖手不釋卷口不輟誦徒自勞神抂用心矣邪求皆是相念奇佩卷衒異露言涉形象之蹤皆拘執之相矣正定理玄深外絶攀緣內守純默妙極無擁其理玄深巧拙高含識賢愚不侔用捨有異然於臨事盡謂高奇不務伏藏自彰巧拙唯高識之士能鑒之也輕浮力不任不執厥中動違理道自貽覆餗益力不任也大乘通語默運載之功其利廣大雖言而不礙於有雖默而不滯於無玄中又玄通乎妙道矣稽古便知今稽古之言鑒照之用虛妙應物不言自化知今之道莫大斯矣笑盡人間事大道冲妙非愚所知雖觸類面牆而翻肆其輕忽矣到頭惣不知殊不知世間萬法因道而形因物而名洎乎致詰莫我知之信心終是實欲求玄解無如自信其心信其心則歸於實矣如日瑩無欺其道不昧內照靈源亦猶大明升天則無所不燭矣舉措持恆久執理持行恆不失儀故老子云終日行不離輜重其斯之謂矣貪生却似癡苟迷至真嗜欲不節貪生而喪生愚之甚也善緣銷惡趣以善為道則惡不生其猶舉善而教者歟惠愛廣將施是以聖人布惠流愛博施於民而不離道者矣五金并八石銀鐵五金礬砂八石山川所産功用斯多一一注仙經神仙列仙之傳內景外景之篇皆說修礦之功即是長生之藥雅有深仁行仙者以好生惡殺屈己伸人鬱有深仁乃為仙行矣無非不暫停勤行於道充靜於神調𠋫侈時不可暫輟矣日華精汞法汞者陰氣復能含陽故以日華制禦其法也月魄鍊砂靈丹砂陽精亦畜陰用故就月魄以合其靈入聖超凡骨日月滿足脫落几胎超昔日之塵蒙見此時之聖用變化本真形易乎昔體成此新功可以羽化升天童顏不老本真之形自然而化矣甲辰歲高麗國分司大藏都監奉𠡠雕造
