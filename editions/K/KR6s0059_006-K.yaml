body:
  text: 逍遙利樂認天真逍遙者南華懸解之名也旁通萬有周流六虛邈宇宙以非寬㧾希夷而無外利以正其性樂以適乎情皆本自於天真也心印深藏喻海津以心印心深藏於密其混融也若百川之會于海渺渺然誠企望之所不及矣妙法湏求經裏字必求妙法湏自真經字義炳然一言以蔽無緣勞問洞中人所趣無緣者即空勞無益矣縱十洞群仙無以為也研窮道德從何入道者德之本德者道之華務在研機之能窮極所謂得其門而入也則何徃而不通哉清淨玄通馭物親大道精微惟清惟淨從無入有明陰洞陽自非玄𢍆𡨋符幽通神會則何以究也其云馭物斯㝡為親此語苞含堪賞詠指掌明於萬象囊括在於一言賞之詠之妙盡於此丹臺羽客善鋪陳丹臺羽客仙人也羨門子曰名在丹臺玉室中何憂不仙若然者必能盡善鋪舒妙陳至理也於身日益但多為執身起見日益妄情徒甚多為轉賖真理也賢聖何曾免是非惟賢與聖指是明非所以啟迪於人所以昭宣於世然是非之迹則無以免也大道幾時明鄙隔大道凝然未嘗鄙隔故莊生云人能清目淨耳不勞心神自至於道也真宗隱顯在玄機真宗之妙或隱或顯雖千變萬化而動𢍆玄機也周知物理通還感智周乎萬物之上者則理無不備矣所謂神而化之感而遂通也俯仰從來有順違俯即觀法於地仰即觀象於天雖事有順違且理無動靜至人之道在其閒矣冝且守恒存禮讓法天地之常存禮讓之則故人不化而自歸也難中輕重兩相依禮者忠信之薄也若望其湛然常寂之道固為輕矣今開兮禮讓之門俾歸於大道乃輕重之相依是為難也神仙上界道清虛神仙乃控鶴鸞乘雲御風故稱上界也其抱自然太一之道則清淨玄虛高超象表矣𨚗箇何親𨚗箇踈道不虛行惟人是與達者為貴何親何踈修鍊豈教人世識精修至鍊象外成功豈造次而能知也歸真本是太陽居揔五行而合體攝萬化以歸真是曰大陽之居也乃發生之道眀矣三天定相玄中得窮三天之定相𢍆之於心應之於理故曰玄中得也一氣湏聞妙更殊雖用有萬殊而體蜣一致所謂真一之氣也此玄妙殊絕良不可得百言矣運偶不同他往日運偶昌期故得一奉天之道緝熙於世康濟於人豈同於往昔矣老來自在見功夫萬機無擁久而芳或卷或舒隨心自在動見成功也休話還丹大鼎爐陰符經云金丹之術其名百數或乃天為盖地為爐月為陰日為陽四時為𠋫八卦為門終見功多而寡驗者矣我緣經歷盡皆虛方士之術其門不一或學羽化或究長生久鍊無徵盡聞虛設也人閒豈有神仙藥十州遠使三島乘舟老秦國之童男迷蓬瀛之羽客永無妙藥終欠靈丹也天上難開玉匱書王匱之書金鼎之訣秘三清之上藏九洞之中也彭祖自勞閑歲月夫籛鏗之壽實曰神仙既享長齡未聞兼濟穆王謾說走龍駒八駿之馬六龍之馭雖曰走於寰瀛畢難尋於高步矜孤恤寡行公道天神仙之道上不在天下不在地在乎博施於民矜恤鰥寡者矣此乃名為利益殊故孔子曰道之以政齊之以刑民免而無耻此得非大道乎靈藥從來隱聖機九還靈藥太古所傳其機隱微非聖莫測何人得達到玄微道在虛无意超元象非真人上士曷能造其玄微者哉真空入有皆知實玄黃未分則浩氣空寂天地肈判則萬有森羅於是有澄神抱素之方立久視長生之術世知實有信匪虛言運化功能到者稀夫道養守於和粹運化復於淳元藉乎積德累功去濁存淨是以臻其閫域者難其人焉汞裏金牙堪可重黃牙生於河車乃丹之將成也功力斯彰堪貴重矣爐中白雪共含輝丹臺秉志既堅朝礼之勤白雪成功可樂神仙之道勿令陰氣侵陽位夫陰陽相生其道相濟故陰中有陽陽中有陰不可侵而厲之也走作丹砂赫弈飛採四神之氣鍊五行之精厥功有成其道非遠則丹砂之妙赫弈可觀矣時人不識理深玄希夷之旨妙越筌蹄中士聞之狐疑未決悠悠薄俗詎測端倪細意精修被業牽縱然眀白決志精修塵累所嬰莫能專一幻化杳𡨋隨物性夫物芸芸同乎幻化咸資一氣出沒杳𡨋而大鵬鷃各遂其性虛無豈是亂相遷大道虛無亭毒庶類四時代謝萬物榮枯而真一之性未嘗遷變龍飛入位真堪仰陽居正位功在發生如龍在天堪可瞻仰虎伏休閑有自然陰合於陽如虎之伏二氣交感自然而然洞裏煙霞何縹緲洞天寥廓景象幽奇彤霞紫煙縹緲無際神仙景致沒休年樵子看棊𢩁終何爛蟠桃結實動計千年壺裏光陰莫窮其極澤瀉池塘灌藥畦池塘之設以貯天澤而溉灌生植也况瀉及𠋫引汲以時則彼藥苗秀茂於畦矣太清雲黯步紅霓寥廓澄霽煥然太清其或霧結輕濃雲凝霮霞紅霓搖曳步履雍容也松花鍊鼎龍山側山形若龍盤名曰龍山得道之士多遊處焉時鍊松花熟於丹鼎蓋體無用之用故功成自然甲第群仙鳳鶴棲居處華麗𭁺於一方者館於群仙也皆道合杳𡨋數陶寒暑所以三洞為家十洲作宅丹鳳皓鶴同其棲處也分別要從華等級等級乃階漸矣何以分而別之要從華取實捨有入無言象而忘道性無在後天地而老豈為遠哉微言道泰物湏齊㽵老之教皆微言也儻能無名而名雖說無說道體泰然自齊萬物乃天地一指也萬物一焉也自吟自詠求師侶一游一豫載笑載言盖樂於道以求師侶也故易云隆墀永歎遠壑必盈此乃同聲相應無遠不届也入品詩流旋作題夫二雅之作頌盛德暢淳風也若究其旨趣達其品格如仲𡰱云商也始可與言詩也故紀事作題皆盡其美矣道高人世禮周旋雖凝神妙道逈出天人之際撿身絕䡄常居禮讓之先既奉之以周旋乃咸歸於大理也語默如癡似不言夫大道之用也若語若默或寂或喧則言而不言道無不在故愚智辯訥皆不違於道性也洗滌要教心地靜以靜止動乃合洗滌故老子云滌除玄覽能無疵乎狐疑勿類水萍飜道之未達多起狐疑若萍之隨流翻覆無定經書說盡修真理修真之理通幽洞微備載群籍昭然可見歲月休防罷引援夫達妙道者得用無滯𢍆理自然既罷引援豈湏調息雅合無為深見識了以外塵寂平內境雅𢍆深見大合無為陰陽去住促寒暄陰陽交泰遂變寒暄體道逍遙寧拘催促猶龍景象駕翔鸞猶龍者罾綱弗及乃仲𡰱喻老子之德也所遊景象舉必凌虛若匪鸞無以到矣道在虛無天地間虛極妙道體本無方無方之功乎天地一二合將歸大體一氣不言而尊二儀無私而大一二相成同歸乎道五千言外不開關伯陽所演玄言皆至於道五千之外不開神仙異端之關鑰矣儀形眇邈難相類童容皓髮大耳無輪格出風塵比之奚及聖跡希夷語默閑跡出希夷道通語默達人得之於此自然而閑曠也昔日西遊如似夢青牛駕車白鶴引步動必合常之理恍然猶夢之中化胡異域却應還聲教無疆廣被華夏化彼異域道乎未聞不宰功成復還于本乹坤之內隱長生一氣既分二儀爰設含茲妙道隱彼長生藥變還丹道已成靈藥變時還丹始就長風御處至道聿成救世神方堪自秘本期赦世不為矜人絕妙神方誠堪自秘樂耶語話勿相輕但言顯樂耶而旁通正理卷舒在我造次何輕眠雲臥水通玄識眠雲養素臥水懷靈幽棲物外之流絕跡人間之侶彼或通其玄識也點石為金誰辯眀如能點石便可為金人不易知孰能眀辯黃老身心皆得所黃老乃上古有道之士也若身若心無彼無此故皆得其所也登壇善聽步虛聲登古壇上聽步虛聲清含太古之風妙入希夷之境可以正其性可以適乎情大然五色被雲遮古詩云上有兩仙人不飲亦不食與我一丸藥光耀有五色服之四五日體輕生羽翼此乃靈丹五色性本天然蓋以隔雲島於仙鄉致塵寰而莫見聖境由來路逕指十洲之境在六虛之外從凡至聖自下升高若修之未成則歧路賖遠矣鍊礦勿教侵外域金之在礦者鍊其礦而知有金也修鍊之術守之於身若耽之於五色五音則為外物之所惑也真鈆豈得離中華正身守中者大道所尚也夫鈆汞之法修之在人假其道而得其真豈得離於正身守中之道者也苞含日月高還遠道之體也大無不苞細無不納雖晝日夜月㝡為高明然皆處於苞含之中高而復遠矣自是人心識見邪人之識見務在鑒眀或失之於正中必溺之於邪妄龍浴鳳池誰可意說者謂神仙之域有乎龍池鳳沼可以沐浴優游然除得道之人誰可恱乎性也神仙群聚笑唅呀瀛洲方丈之間乘風馭氣之客景象在於方外談諧非於域中無暄凉所遷唯群聚而笑樂也傾依慕善易為興嚴肅其情見善如不及即易興心於樂道可絕迹於塵區也却𢙢人心冷似冰且向善之心在於己也明知作惡招為善獲益奈世之人慕道之情多冷如水也含識昭然何不達蠢尓含靈皆有道性既虛无未達致妙理不明矣非同物類信誰憑二儀未判大道已著故老子云吾不知其誰之子象帝之先所以達人唯道是憑餘非同類皆不足信也強其志莭皆知有君子以自強不息况修養之士豈暫忘於道哉故皆知之以勵其志也未盡任持早愛憎非常之事湏非常之人今雖究道求達其真境對違順心便憎愛任持不能前功併失也倐忽便經閑歲月作善唯日不足豈閑經歲月無所用心倐忽皓首寔可傷哉凡閒聖事可升騰聖事難就俗學易向如知玄无之道可入眾妙之門庶自勉之升騰可冀也逍遙我詠杳𡨋中聖人以不作而作無為而為理盡逍遙心空寥廓故發詠在於杳𡨋之中矣萬物齊歸各異同以不齊而齊於萬物者則雖異而同也曉解精微無所著曉明解了精微之旨則動而常寂靜而通故無所著也先從含識踐真空始從含識終踐真空究理而言不即不離希夷自變剛柔理聽之不聞曰希視之不見曰夷隨自變通則剛柔之理煥然可知也述作縱橫道不窮述作之本義非一揆以縱以橫務盡其妙故所取之道或不窮也剖判三才堪測度玄黃既判天地乃分萬物流形三才可象遠取諸物近取諸身故云堪測度也輝華積德上玄功法天之仁則地之義輝華積德所以𢍆上玄之功也神丹妙道故延年金丹九轉秘訣萬名無非寡欲之方俱是延年之術矣豈是凡流識大仙費長房之變化黃初平之叱石終傳混世之名豈是凡流所識也老子尚猶能諱事夫玄元妙道冲虛為意隱彼神仙之事彰乎眾妙之門軒皇不許亂相傳夫軒轅之術玉匱之訣無非仙骨可觀道性無滯方乃傳之矣誰知造化功夫力夫至道之要神妙罕測或功苞於造化乃力𡙸陰陽而已罕見今生度宿緣夫志士必大遇大遇則宿緣必具自然五通可證十洲克游者矣猛虎伏來龍駕馭仙道既就恣意遨遊可以左馳蒼龍右鞭猛虎者矣雲騰五色思悠然金闕玉京瑤池寶殿雲霞五色瓊樹萬尋也誰知學道本來真修鍊之門本來真妙悠悠學者孰知其微鈆汞為媒㝡好親鈆中取汞用之為媒和合陰陽㝡為親的非是虛傳經歲月秋毫有差千里之遠是以學者甚眾得者甚寡言非誰誕虛歷古今自緣無識探龍津自虧識洞達幽微咫尺龍津迷同萬里初凝白雪堪可貴水火既濟龍虎相交金鼎開時花疑六出解點黃金妙入神建乎入用點化通神變礫為金博施濟眾術數催驅依造化得其真訣依而修之數力潛駈倐然通變爐中造化立見神功老顏改作後生人一粒還丹玄功𠕀測雞皮鶴髮却復童顏非來非去亦非忙道性凝寂非去來之法所以迎之不見其首隨之不見其後自然而然又非忙也所是凡為自短長背道徇俗觸類皆非故有短長自為取捨非道之咎冝自求諸專志比徒歸一等道徧於物皆歸一等然湏專志凝神儻二其心即徒勤修習尓誰知禮度畏三光禮者道之華忠信之所薄自大朴既散澆風欝興但責之以禮讓不知遠於道德縱畏三光亦何關於至理哉相傳秖要達真境要達之道在於真境相傳之旨在於無說如得其宗源則三清九天以遨以遊也勿說辛勤却易傷修養之士在久著功行則仙路可階若但說辛勤欲期雲漢或畏時長而易生傷感矣授得道心皆語默夫受授者必志超物表形出塵外語默雖異而道心愈眀矣四時八節順陰陽二氣交泰五緯靡差且得道之者動而得常無忤於物任四時迭運八節㸦至蓋歲月恒數故皆叶順也十洲洞府養神仙十洲風月洞府煙霞是神仙棲隱之方乃物外逍遙之境幾說桒田屢變遷既達妙道却顧人寰嗟海水以揚塵觀桒田而屢變老子商周為柱史老𨈭之系起自商周為柱史之官欲清淨而為理演道德之教揚虛无而為宗者焉劉安拔宅上青天劉安慕道鍊藥功成妙在真遊舉家長往者矣名山隱遁非堪守仙都方丈盡是名山苟未扣於玄微徒收心而遁跡鍊藥修真本自然至鍊精修亦属象外本真妙道其理自然想取儀形通感應前賢設跡乃是儀形雖彰通感之功亦蓋天真之理徒勞運智亂烹煎象外之象玄中又玄非運智以能成非烹煎之可就真空達得便湏休玄門精鍊巳達真空塵境既眀恒履大道二起生三一上求老子云道生一一生二二生三三生萬物夫求一之旨挹流尋源源流既分視道如掌謾說希夷來遂古大道本來玄微冲湛既窮其一已見其根是知說道者由之遂古皆非也還知造化不同流造化分形其流不一雖寔繁於品類而咸遂於生成伏藏密旨機關內機有發歇之用關有開闔之功玄旨秘藏卷舒動靜莫不皆由於道也合會非常本自由庶事叢萃處道無煩功顯自由應用何極若遇逢師親口訣道無蹤跡心有晦眀若非口授師承安得神清性逸老年返少保千秋大丹內服遐齡外增歲月雖遷海深山固見他顏貌未知年乍覩神仙之貌宛如童子之顏未萌修養之方故曰未知年也便說人間壽一千且約龜鶴長齡便說人間之壽乃千也修鍊要門皆的實修真之法鍊日之精布氣含和不德而德斯門之要豈虛也哉行持法度甚精專堅而行之默而持之還神固身有法有度既精而且專也矣於身有益何般是求身之益不在於他究理而言以何為是也指口為眀道理全訣在於口指以眀之庶幾乎玄𢍆也即理無不全矣更擬細窮方外事方外之術諒匪一途必欲窮之造次寧盡無言無語上青天乘雲馭鶴欻尓而來僶俛之間還歸上界大底緣由比類深修鍊之功緣由難測或以日月喻其高遠或以龍虎喻其雄烈比類多狀良謂幽深難中此道費光陰世之技藝習學猶難唯此神仙益為玄邃空間成集多費光陰若知濁浪澄清水靈藥未成混塵慮為濁浪神丹克就通浩氣為清波若知此玄方造玄景不達浮生認白金白金者雲常子云陰陽含養妙用通功真無不至者也然則顧浮生之速如隙馬之奔其或不修丹臺之妙門而認白金為至寶者世亦有之走作真珠藏妙理鍛䥫鎔百變淬通金蓋玄妙之門非真仙莫測幽秘之理藏攝實深究推神室好相尋飲沆瀣於丹田養鈆汞於神室推究其道可得而尋矣功成穩審時閒用畢九轉之功耀五彩之色濟人益物安然自成却老長生時有大用變轉無窮重古今一人得其至道萬人慕其神力授受將來轉變無盡古今世代崇重何窮甲辰歲高麗國分司大藏都監奉𠡠彫造
