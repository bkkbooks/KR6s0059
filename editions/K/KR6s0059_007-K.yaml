body:
  text: 脫空謾語莫知真情多虛誕言不由衷未若仼真安貧守道矣誑惑愚蒙謼殺人令色巧言誘誑聾俗情既無實事豈有憑詐偽漸彰王道逾遠也愛者擬求名利用徇利之士惟貪是懷欲鍊丹砂點化世寶徒增愛染但益妄求也被他悞賺怕論申為他之惑惜己之名雖欲言之其可得也唯言草異生巖谷事既無諧乃言草異徒指生於巖谷即別採而可成更說天涯泛海津廣引虛無妄陳遐遠秘訣自仙鄉傳授靈苗從滄海收來也有甚相干爭道理未若求魚緣木陟山採珠得之者獨善一身失之者邈若千里也幾家燒鍊幾家貧凡不達修鍊之旨者既貧於道復貧於行也然未聞有陶白之家矣逍遙理路達三清舉措逍遙坦然理路可以上達三清之境也非是尋常取次名名者得物之稱且道體凝虛玄源湛寂不可以名而得不可以象而求故老氏云名可名非常名也此語不宗凡見識此非常之語絕妙之門逍遙乎萬化之中游泳乎六虛之外豈凡常見識而明之故不宗也籠羅大象顯昭眀籠羅萬象而大道在其中矣昭然明白即可知也傍通照料周遮遠旁通萬有妙𢍆重玄照以明之料以裁之周無不窮遮無不徧玄之時義遠矣哉異境凡從智慧生大道甚夷而人好徑凡趣異境皆自智生既失自然咸歸大偽方丈室中誰口默方丈神室之中忽尓忘言澹然成性故黑而識之也真心傳受一般平真人之心心真無外在乎傳受如而平大道逢來是宿緣夫道者神明之本天地之粹不可以當世學只可以累刧修具緣具福方乃遇之終期定可訪真仙紫氣仙人洪崖聖者士有造其巗陟彼奧扄必違深靜之源以保冲和之氣山中修鍊非州郡若夫隱乎巗扃出乎嗜慾佇丹成於龍虎俟足步於雲霞也城裏無荒隱市鄽秘訣之妙虛无之系造化之根得之者非在深山隱之者何妨城市秘術豈教容易得𭷁之以君訓之以師幽明動擅咸暢其冝此秘之術豈容易而知幽深還許相傳幽深者浩曠无端杳𡨋無對既傳習有自乃師資相承也超凡入聖渾閑事士有棲神鍊骨逸於霄漢含微𢍆虛蹈真境而為仙矣問取人間十洞天世人能遊林麓息澹泊絕嗜慾喰餌煙霞散塵慮之方般賞仙鄉之十洞道法窮來理甚玄道法乃金丹之訣也其惟聖智通幽洞微方知理趣窮極玄妙知之修鍊口親傳先知其要然後乃修妙在口傳用而無失故曰知之修鍊名曰聖人棲貞有象藏烏兔恍惚精真其中有象兔疑陰魄烏燦陽精二氣感通功齊造化自在遨遊本地仙道之至矣功之成矣自南自北以遨以遊雖混囂氛宛同輕舉赤水華池湏是秘丹還五轉名此華池大用漸彰理冝緘秘黃㸦寶鼎要精研藥之成也名曰黃㸦造化神功由乎寶鼎而消息之法切在沉研靈胎變化無相剋樻法通靈如胎含養五行相剋為害之深理在周防日慎一日龍虎昇騰論汞鈆陰陽會合龍虎飛騰良由考鈆汞之功知子母之𪫬然後用之乃十全矣玄機聖境謾勞心眾妙之門唯玄機能遠真聖之境唯修鍊方到或塵慮未忘俗態猶在丹鼎華池謾勞心力何似窮研道理深消息盈虛先究其道儻得理窮源則玄无之域或可躋升矣升降自然隨我命樂天知命我乃自然升降隨時方圓任器皆符至理矣莫教虛度向光陰顛沛造次尚或於是豈可未明大道不貴寸陰虛度之誡誠堪書紳幾人達得幽閑趣宇宙至廣賢愚乃眾入希夷之玄奧達莊老之微言者亦鮮矣如樹爭高力不任豫章之木七年搆廈如未成材徒增聳枝葉所附力其不任亦如未曉真歸妾期馭功既無就翻招其也闇裏差殊終墜墯暗裏不欺方寸無愧則何往不𮍏若色厲內荏言與行違自作差殊何免顛墜也神仙尚𢙢有飛沉夫運氣養素長生久視壽齡不耗歲月仼遷蓋心出混茫跡超塵堪苟縈拘心跡𢙢飛沉未脫矣濟世勤行任百年布行葦之澤敦好生之德任奔日月徒改歲年而惠漸黎庶心無暫怠亦如天行健地厚載豈有休廢哉方知大道自昭宣執左𢍆以御物者其唯聖人乎且天何言哉四時行焉萬物生馬故知大道昭宣物無不被矣休誇解變黃金術五金之用名本其性其有虛心合道從無入有藥化䥫石盡成黃金縱斯道有成又何勞矜誇也誰信空磨白玉穿玉之為物也磨而不磨混而不淄世誰信之有其穿薄然磨礱涇久亦可庶幾豈若抱無名之璞懷𠕀象之珠與時長在者哉智慧冝從高見識見於末萌識於未地自非智慧獨斷高明不拔何以從於斯哉陰功及物㝡彌堅功及於物而不宰者其道遠矣可與造化爭長天地同門豈以駕鸞鶴飛騰雲路而為難哉是非達取此言語言於陰德智慧則道性可階語以變金磨玉則俗情何脫明白煥然奈世人多惑矣宇宙常存隱聖賢得一以清則宇宙常存而又聖賢隱居其內盖知之修鍊不為物所賊故也青松本不樹蕭條萬木逢秋皆有凋殞唯青松千載不畏雪霜神仙傳曰好食松實者可能飛也學士因何智自勞學道之者昧己外求勞慮自伇二丹不能窮其本一真何以明其宗金水朗然眀皎潔挹少陽之正氣注元府之精英金液流形光潤皎潔雪山堆積就中高大丹既就凝若雪山燦然可觀精瑩何極志心但覓三神藥夫修道者確乎不可拔其志則於道匪遠三神之藥必致長生拪真子三住銘云凡在萬物其所保者莫先乎氣莫先乎神莫先乎形若保此三者必得長生也凡目難觀萬里毫未修三要三寶莫獲諒諸凡目則何以見萬里之秋毫我獨閑吟誰解意興題立意豈獨詠於神仙養民事天正冀通於大道悠哉麗日𡑅靈鼇大易云日月麗乎天是知萬象森然三山鼎列靈鼇既負仙景可觀矣乘雲駕鶴自西東雲乘五彩鶴駕九天深居冲寞之中自得逍遙之興故云自西而自東也修鍊真人意氣雄極修鍊之玄者謂之真人意氣雄然則非鹿容俗狀之所及也出離凡為高見識六氣無覊三清有趣斯可謂之出離也至若見精方外識洞真空又甚高矣周旋道理遠懷通周旋其道也則萬化叅同周旋其理也則一真𡨋會故其所懷也則何遠而不通矣愚迷盡說皆非實丹臺秘訣玉境真歸豈愚者迷者之所用心故言非實斯乃撫掌大笑之謂歟解者方知事不空懸解逍遙之理者方知逍遙之事不空也宿業大都心外障靈丹未究宿業尚縈既遮心內之明寔由心外之障也有緣歲月易成功必於神秘之方有緣者則金液彌精華池無擁無勞歲月動見成功也八風雷動遶炎洲炎洲者海內十洲之一也雖八節八方之風如雷之鼓激而仙鄉雲島安然居中且漢武為鈎戈建八風通靈之臺斯並真人遊息之所也巨海波浪四畔流當渤澥之南隣聚窟之地十洲𧥣云其地廣二千里處海之中也故洪濤巨浪四面而流鼠向此中毛骨異洞真經說炎洲之上有炎山之鼠其流可以為布斯則靈物得非毛骨異乎布成將舊火燃休火鼠之毛為布也服用將舊必就火以燃之則垢污頓除文彩重絜有同世人用水而浣衣也白銀絳光霞麗其中有太丹火流之宮銀城絳𨷂之製光舒霞爛綺麗堪觀紫玉黃芝瑞氣浮仙人所吹之笛多以紫玉為之又金芝九莖真境之瑞斯乃羽客玄君所居之地有茲瑞物之氣而浮騰焉聖境山林人莫訝火山丹宮火鼠風獸山林異於人世物象殊於塵寰境唯神仙時流莫測延年皆是眾仙遊服九轉之丹得長生之壽出入遊起皆是諸仙者焉窮真妙理訪仙鄉夫窮真究理者失湏躭味玄默修習冲虛然後求登洞府訪謁仙鄉也雲水青山地久長三山十洲雲濤杳隔或道未超於世表心陡懸於物外則山水攸長不可得而及也聞說洞中諸境異神仙之居非塵世之境既傳聞於今昔孰不冀於遨遊矣誰知鼎內有非常藥養丹鼎道在靈臺外即無欲無為內即惟寂惟默也遭逢秖是因緣感長房鄽市逢仙喜傳秘訣𮬪子圯橋取履慶遇黃公皆是遭逄因緣所感矣費力無成枉用忙修鍊之術吐納之法在絕利一源達乎三要儻背此而修者則費功勞心終無所冀也瑞氣青天含象彩紫霧亘寥廓慶雲徧太虛光芒隱大道之精燦爛蘊真人之氣矣十洲閑坐論陰陽十州之境群仙所依以亡形無為之言演坎兔离鳥之妙也豈將容易話長生長生至理道在杳𡨋養之於顥氣靈源因之於谷神真宰豈以延齡善術保命仙方謬泄玄機容易言矣辛苦徒勞業未精雖餐松餌栢吐濁納清修製丹砂煑鍊白石未曉抱一之道其猶避影之狂虛廢功勤徒自勞伇安肯便教貪上得道以去甚去奢惟清惟淨蠲除嗜慾鄙弃喧華豈以放意恣貪而能階其妙道者也先湏禮讓後純誠禮讓即修身之本純誠乃𢍆道之源務實陶真理符妙轍絳霄音旨人難解絳霄者三清真境音旨乃大道希聲惟上士之能行非塵蒙之所解白雪消停竪有橫白雪乃大丹次第消停者造化玄門運化縱橫奇功自在象外仙山諸境趣象外者虛無之物表也仙山者即得道神仙之所居閬苑瑤池金玉闕洞天佳境不一名諸若非修鍊躡三清其欲昇雲御氣駕鳳乘鸞若非鍊行修真即何以達三清中路也丹丘霧彩好林巒夫人欲吐故納新屈伸道引精思靜默必遊霧彩憩止丹丘棲泊林麓者矣盡是天宮不死仙於是虛皇命元始天王編之於金簡次之以王章永處大羅有生之日無死之名也常與神人為窟宅夫金丹玉芝可以乘雲軒引羽蓋者必神人也常以瀛洲為宅方丈為窟矣能興風雨秀山川鶴駕往還風雨相隨萬籟俱發山川秀色也溪頭雲出搖紅葉武陵溪頭桃源洞裏白雲溶溶而出岫紅葉紛紛而搖林矣谷口村稀伴碧煙谷則虛應溪乃聚流山村隱隱而相隣水煙以交暎題品洞門房密秘夫洞府關鍵不得不秘秘則丹靈骨清扼一長生尓隱藏蹤跡𢙢相傳夫冲虛靜默遊神之極必藏乎名隱其跡者也南來北去及東西聖人之御宇也每慮德之未至化之未被是以闢四門達四𦖟觀風俗之厚薄矣萬物難歸一等齊萬事紛糺長短相形而民之情封執膠固混而為一不亦難乎倐忽爭知興變易倐爾變通虛心齊物易同反掌孰能知之故老子云吾道甚勿知甚易行幽玄恬澹不昬迷既能玄覽專一守雌則滌蕩昬迷歸乎清淨區分有截無邪見執乎左𢍆法彼健行掌視八紘區以別矣則自然民思無邪順乎至化軌如空詠好題然則法天行道垂訓萬邦而心𢍆無為寂如空也夫如是則可以詠謌之矣天且豈容私輔德皇天無親惟德是輔豈容私徇翊戴聖明者哉功成自竪入雲梯不宰功成歸乎大道如昇雲漢必假丹梯從有入無良在斯矣天地為爐我自知天乹也地坤也萬物由是而生其有法陰順陽握符執𢍆以造化為爐剛柔制度成熟庶品鎔範五行此唯聖人知之餘莫能尓也人無遠慮必生疑至理玄邈非大智不測況見慮不出於物表疑惑必生於言下也功夫未至勞懸想夫欲造玄樞求妙術湏假積德累功凝和養氣若五色在目可欲惑心則道性逾遠徒勞懸想而及也境外聲聞不改移純粹積中聲聞于外故知大音希聲聽之而不聞蓋匪應荅可求是以居境外而不改移也機巧豈逢容易得機関不息巧偽愈多雖道遠乎哉豈容易而得也是非終究欲何之杳宣無象是非糺紛自背虛无伹增矛楯期趣真境欲何所從思量大海深淵理道者妙用無方自大而求之則逝而往自往而求之則遠不及若能了悟則當在目前既非思慮所知何溟海之深可比度也光陰虛度影叅差日居月諸倐忽光景真歸未達俗累尚縈陰影叅差誠為虛度也流砂一味細堪觀陽精日華從陰所產一味神結妙可用心矣萬象籠羅幾百般神方百妙在一真通貫太微詼羅造化也湏向鈆中相假合純陰之體出自陽精鈆稱老嫗納以少陽內外相容成乎假合分成鼎內見其端和合陰陽乃成道矣鼎樹三才鍊成一氣始由曉其端緒矣煙霞聚散歸深谷陰陽符𢍆乃聚煙霞二氣交分逈歸深谷復返致養之所也水火相逢不用乾舉以水火明以陰陽內外相逢合成道矣不至凝陽美之至也乃是不乾養就大還昇世界陰陽相美育產元精即含章可貞以時而發離塵寰矣月宮乞取桂花看神功既著妙道乃成或馭六龍昇乎碧落優游蟾窟攀折瓊花矣崑崙山上聚神仙洞真經云崐崘山者黃赤二道交光於上上當天心皇母帝君神仙同會之處羽駕爭行意不偏神仙動息出處自由或馭鶴以飛行或乘鸞而上漢同遵至道意復何偏積雪遠看欹下界仙山積雪靈境復嘉遠遠看瞻如欹下界巔峯高認湧流泉寓目萬象登彼高峯流泉湧出於煙霞仙界倍勝於凡界真空的實難堪比大道玄門真空妙性無形虛極比類誠難異景皆從造化遷不達真空昧乎虛寂皆隨異景遷謝何窮秘密豈教容易辯神仙密旨出離凡情觸目隨流孰能辯認玄中之外更深玄大道坦然逈出塵界強立虛無之稱蘊乎造化之中玄之又玄其在茲矣溟溟滄海浪濤深蓬臺路遠仙閬程上插青下盤滄乘溟溟然蓋浪濤之深也霧蔽山巒不易尋濛濛煙霧蔽彼山巒既仙凡不並故未易尋也史記云三山在渤海中望之如雲也紫蓋洞人駕鶴荊州記云衡山有三峯其一曰紫蓋常有雙鶴廻翔於上故洞人駕之上游於絕漢也虹霓城郭道為林十洲九府虹霓城郭斯必以道為林也幽玄相去何多少幽深之境玄妙之門本自丹臺寔曰精鍊且相去之幾何也巧拙無由智慧侵雖能有巧拙用有淺深而道絕百非理歸一揆但可以𡨋𢍆玄符也雖有智慧將焉用之故云無由侵矣盡是同緣相引接同聲相應同氣相求必可以引至於道也從容語話八仙心列仙傳云淮南王劉安言神仙黃白之事於是八公乃詣王授丹經故知從容笑語之閒靜見仙之心也大都滋味莫因循老氏云五味令人口爽又云味乃腐膓之藥是知却彼滓穢行乎冲和不可荏苒因循眈溺於味也减節從教歲月身節啄腐吞腥之患從吐故納新之門延歲月於身中期升騰於象外述作比人世解聖人述作廣布仙經比欲世人聞之即解凡情謾說內丹真外丹者烹金鍊石內丹者存神固身此乃修鍊得門方能成辦而凡常情見未及精修自謂了其內丹斯則誠為虛談消停意上寬還遠原夫道心惟微大道不器務在養內養外不假芳形竭神儻消息於無名強名則𡩖廣於惟寂惟寞者也宗旨猶來㝡好親道者萬物之宗其旨冲邃是以黃帝有崆峒之問莊子喻螻蟻之微仲𡰱復云丘之道也其由醯鷄斯諸聖人皆親於至道者也動靜機關勿勞苦恬澹清淨札素和平不施機關本無動靜若違而求者徒勞苦焉坎离卦象善調勻坎為水為陰离為火為陽水止則靜火炎則動周易云一陰一陽之謂道或其道既濟必大象知句理𢍆自然斯為善矣逍遙但信莫狐疑清淨玄元先天地而有惟上士為之勉力餘則大笑而猶豫也天自高兮地本卑天形穹隆地厚磅礡易曰天道下濟而光明地道卑而上行也曉取聲聞歸至道真仙上聖方了聲聞抱一不離乃歸於至道也從來法則盡如斯爰從上古迄至今時亡形得形無性見性皆依斯玄旨尓物情運化真純理萬彙陶冶運轉變化皆是妙用同臻純理也謾說周遮問不知道不周遮真非形象唯明達之士證之於身心旦非肆言誇誕以得之故言者不知也性識賢愚俱一體稟靈賢愚道皆一貫賢者任真而自省愚者日用而不知矣善緣惡業影相隨行善則吉行惡為凶是知影無恒體曲直猶形隨逐定矣靈芝出見少人知靈芝無根為國之瑞非聖所感孰能見之况乎道旨重玄知之誠寡此是含玄故不疑大道虛寂包重玄上士聞之故無疑也隱逸大同非妄想高奇之士庶幾上仙或隱囂塵或棲巖壑喧寂一致物我俱忘精誠自化豈叅差精誠𡨋感神用自然千變萬態纖毫無失翱翔碧落乘雲駕或𩥵皓鶴或駕彩雲翱翔杳𡨋何往不適宛轉虹霓入室時霓旌絳節縹緲三清興罷遊仙還歸洞室至道就中升降等大道坦然本無高下學者不敏情執萬端丹田日用有盈虧日用之要在乎丹田稽彼盈虧由乎勤怠虛心玄覽能無疵乎甲辰歲高麗國分司大藏都監奉𠡠彫造
