body:
  text: 逍遙知語默聖人之御理也不凝滯於物不封執於教發言合道守靜惟真所以語默一致逍遙自適也境外見真空真空之旨超越塵境故須遊心於杳忘情於物象妙用無際綿綿亘古焉有位皆玄感處非常之位明非常之道皆符契上玄俯順庶品故使樂推長保永福也無緣不用功妙本冲寂修之仗緣其或真性未明塵心尚壅縱勤功用事亦虛勞矣義說三才理天地剖判人倫攸依淳風既禮教斯著三才位而萬事彰矣幽深萬事通極深研幾退藏於密此乃道體幽微雖通濟萬物而日用不知矣因依堪法則道經云執古之道以御今之有蓋行無為之化以理有為之俗而則之何淳素之不復哉荅謝向旻穹天之無恩而大恩生故以萬物為芻狗盖不責其報然覆載之內誰不尊戴於穹旻矣大道虛無境大道冲粹凝湛一真應用無方本乎妙極虛通之要盡契玄元矣信之則有靈上士勤行信而有徵神靈谷盈善得道用者矣幽深玄妙理抱一之功幽隱深邃照用玄覽體括虛無應物自然究理何極運轉幾曾停天地權與妙本見氣滋養萬物運轉無窮動而愈出故未暫停也拘束從何益道之所宗逍遙任性變通為用虛極為玄或見滯於情事有拘執則有何益矣周通靜杳杳之理生成之用周通萬彙動息常靜矣真空非作相真空之妙非色非形取相而觀背乎道矣善應保安寧善慶之功旌乎感應天清地寧自然長久矣我自常安樂逍遙之道理契希夷達其深源自然安樂矣凡情勿笑耶道本淵奧宗旨甚深下士聞之而大笑故誡之矣雲生諸洞府洞府皆神仙棲隱之方故雲霞渺邈非洞府而不生𣗥不放仙花根性既珠仙凡自異諒其棘刺不秀名花盖明修道之士品類有殊矣地卑三光照地本卑下而能厚載得一以寧功契上玄合三光之照矣天開五色霞天法於道道法自然運用生成於物不滯乃五色霞光縱橫分布未知何所是道本凝寂而昧之者孰了其元故道經云吾不知其誰之子其斯之謂歟善願理交加於諸法中而得至理者乃因善願矣願之與理俱不可廢矣我達逍遙理觸物無滯名曰逍遙舒卷任情乃達其理隨用利物其惟聖人乎陰陽運五行一陰一陽動轉不息潛運五行之氣用全二儀之功矣道從初一變混元之前澄寂無狀洎道生乎一一生乎三變其淳留不出於道也德合混三清變澆漓之風歸淳素之化是以大上立德德立道生可以脫三色之樊籠躋三清之聖境聖境堪依仗抱一還源窮神入聖故境界之超異也復何勝道哉誠堪依仗耳狐疑事不成於事不决妄起迷疑如狐之渡冰猶預多慮志既不一事亦難成異端違雅淡道性冲淡守之則真其或攻乎異端是乃違於大道矣返禍自輕生既不純和貞絜仍聞順佫背真真境未臻禍階先及自貽伊感可不謂輕生乎逍遙人控鶴優游自適至人不拘或駕鶴以凌虛顯逍遙之不滯碧落壓天津圓盖四垂壓乎四極誠為神仙勝賞之處也達理通含識物理虛通道性無別一以貫之其在茲矣虛無即是真虛無妙本體本即真物物周通何往弗濟河車誰肯信延齡妙術傳乎至人正氣河車信非凡庶鈆汞本相親鈆汞相資陰陽共致於道非遠名曰相親造化皆如此虛而無心動而有應造化萬彙功成一揆今緣論宿因積功累德詣道見真諒此今緣本由曩植何處堪依仗法天為父稟地為母以德為弓以義為裘用仁作冠兼信為冕自然堪依堪仗也經心便眉道濟天下功合玄穿耻不義而取憤不仁而人所以眉尓世情多詭詐狐面狸德言與行違既乖禮義之風難居仁壽之域故業重信愚癡易曰履德之基謙德之柄本乎信崇乎仁豈愚昧而得也取次招他謗露才揚己自是他非首招其謗直為怨府尓違非不自知老氏曰自伐者無功自矜者不長故行乖德薄自不知尓貌恭無德行夫教恭柔侫必外現禮容內荏惡行故宣尼云色厲而內荏也禍福在修持易曰善不積不足以成名惡不積不足以我身小人以小善為無益而弗為也以小惡為無傷而弗去也此王在改過修持尓虛無知大道虛極無為絕於視聽達乎應用其猶橐籥虛而不屈動而愈出達欺妙者所謂知大道矣極意思悠然意之極者所謂忘其象也則神思悠然於物表非世態之所拘爾摩日雲中至於道者則情無所滯形無所羈如在空優游自適瀟湘水似天瀟湘之水凝碧如天况乎達人性其情而合道忘其象而入無得一混然良在斯矣孤峯高遠近峯之高也則洞觀遐邇道之高也則妙入有無達往知來如視諸掌寶月瑩團圓皓魄圓時無幽不燭况達道之士玄覽周通則物無遺照矣信解明開悟至道冲虛超乎言象非信解明白者不能開悟於玄奧爾青霄在目前九重霄漢渺邈無涯一以貫之宛同目擊庶幾乎不出戶而知天下矣逍遙名有理夫天命之謂性也率性之謂道也雖道無常名而名有常理以其綿日月而不老配天地而長存故得謂之逍遙矣得一便知空既窮真一之門便造真空之境夫如是則得無所得得之大也知無所知知之至也道本背深邃源至道之來則持受異氣稟之自然非積學所能及也信所謂深而且邃矣凡為不易窮崆峒絕境不可以苟求汗澷真蹤不可以力致至若心期玉室志慕丹臺者几有所為未易窮也品流才雅淡飡朝霞而養素吸沆瀣以食精既曰清虛誠惟雅淡若此之品流即仙才耳挌致意潛通格致玄同機關密契志以道寧竟潛通也救世傳相益万年神衍良足以救世也傳而習之則有以見復性命之源踐長注之踐斯可謂之益矣因成順八風吐故納新登神導氣內凝一真之性外調八節之風動順天和咸歸妙本誰測玄機聖玄機幽邃非凡情之所測惟聖人探賾索隱鉤深致遠故能顯諸仁藏諸用也天功地久長圍天地周備其理故使能長且久不隨物變尓群生皆是性群生類聚營務且殊其間巧拙不侔賢愚莫等論其幻情則有別推其道性則一同道德有圓方道者同於道德者同於德此乃功用兩全方圓一致也妍醜隨情意道非美惡情自妍醜老子云天下皆知美之為美斯惡已盖美善無主俱是妄情矣於戲細酌量聖人欲令窮理盡性從無入有故發歎辤誡勸學道之流審細叅詳達於玄奧尓達人知淡泊寂寥虛靜湛然常存達人體之獨立而不改周行而不殆也默默見非常非常之道在於無欲而觀是以古先哲王行不言之信處無為之事玄默之見斯為要妙矣道德誰分別德者道之用志於道據於德異𣲖同源無分別也逍遙我自由優游自若放心於自得之場外物不能浼其中我自曲矣時情人不達道即日用而不知一人用之不閒有餘天下用之未聞不足盖人不達也深理少相投道者通幽洞微之玄盖不知其妙而少相投也已是終無益修道之士若恃兄之能老子云自見者不明自是者不彰終不為益也非他作逗留不緘其口非飾於他不惟違理捐物兼於道懸遠也奈何為各異達士迷人情懷各異君子依道小人隨利無奈何也未定復還休心尚猶豫不能勤行往復思之却生墮𢢔奧義通玄化夫至道冲邈包乎奧義故能通於妙有叶於玄化矣精微妙入神杳之精通微應妙盖善究虛極以彰得一神授其靈應用無竭也功程隨志願積德累功趣乎妙道行隨願感報應斯眀貶降背於真道本無言依言顯道以是非而取相或貶降以拘情動念乖真背於道矣靜默堪為法靜默之妙志守唯靜事可䡄持善契真理無言事可親大音希聲無言契道理事俱寂息用澄神惟德是修故可親也逢師傳口訣玄元秘旨妙出有無在三之義既嚴得一之源可究矣金玉變埃塵富莫富於無貪貴莫貴於得道道既可得心故無貪視金玉如埃塵誠可信焉清靜真空理妙本無極目之清靜塵滓不染是曰真空矣不無解者難至理眇邈有物非形而為學則日益為道則口得無難解乎縱橫依見性於物下滯任用無方其可洞明依乎見性廓落智中觀理本寥廓而智者達之如指諸掌矣坦蕩歸仁德至道玄遠坦然寬大垂象示變人可則之皆歸仁德矣辛勤久遠看勤心慕道立志求真旦非動躁而可成在乎久遠矣勿教為逆順逆即違理背道順乃負陰抱陽今制度冈𠍴修暮應𠋫煥然可知也平地入雲端御氣乘虛在乎道成功著而浞德合上玄仁資庶品自地昇灌豈為遠哉𠃵坤常運轉乹剛坤柔各亡其用晝行夜轉以成其功故曰天道東南地道西北而運轉下息也兀兀見眾生眾類之生徧乎天地盡受陰陽之覆燾皆從造化之發生然則兀兀陶陶日用而不知也利物終相應內守於正外利於人普育黎元汎愛群庶必同聲相應無不合於大道矣施為願要精欲立身行事剋己安人須發大心以利萬物施為作用故要精勤身慵何隱遁其或獨善乎一身慵於濟物退處巖藪慕於寂寥斯乃違覆載之深仁行隱遁之小道耳舌辯謾縱橫其或巧言侫辯口給心非無實利以及人有虛飾而在己終乖不言之理謾施縱橫之機焉種性歸真理人之稟性維有不同至摭實而為談須云非而取善不向真理何所歸乎因緣有重輕同浩氣處此人倫盖修因立基已有善惡及稟質受性乃有重輕者焉仙經無限意丹臺妙訣玉簡靈書盖得乎修真養素之方豈獨靈乘虛步雲之旨秘乎紫府可得而窺也龍虎返丹砂陽龍陰虎二氣迭運成之大藥力同神速採綴陰陽理法奇偶之正理著變化之玄功煥尓遐丹大哉妙術終期嵗月賖易朝菌之促為大椿之齡有以見壺中日月物外風塵皆可以至道窮之者夫求來皆有應功行相資目足同濟志必感神之道聲必應響之談其來著矣不信固難誇釋以信為功德之母儒以信為景行之先如尚渧疑固難啔迪忙說閑清境不發揮開乎蒙昧三清勝槩如視諸掌真誠悟幾家信必由中言必干典真誠無妄群動可依陽與陰和合丹經叅同云陰者道之基陽者形之始故陽因陰有陰稟陽孕能滋萬物為萬物基者也須從一字求考五行之精花真一之道脫落塵世遊心冲寞故老氏云天得一以清地得一以寧神得一以靈是也分明皆是象聖人取象陽精陰魄積九數以先立攝万物以皆歸故易云在天成象在地成形作相不能投夫大道者寂寥無聲淡乎無味視之不見德之不聞豈作相而投何挹持而得也舉措先真實謙弱者德之柄柔和者道之用必處其厚而居其實也精各自柔學有精盖性有利鈍亦在守其柔弱棄彼堅強者矣恒持通覺悟道性虛極妙本湛然當須絕棄塵境覺悟玄解持守雌靜而已萬𣲖水東流百谷朝宗而東注天地之常道也易曰巽利東南澤潤萬物者莫大乎水德以况於道之用也鈆汞精修鍊鈆汞之親雖同母子制之失度倐類參商理湏精研然可修鍊陰陽恊物情得其真訣絲毫不差則自然陰陽相生變化無爽所謂冥符於至誠之感爾花開黃道正黃牙白雪燦若花開用之則可以變通餌之則可以久視黃者中之色也藥就紫煙輕丹之成也則有紫煙輕覆於金鼎斯則神功內圓靈氣外溢之象也海嶠浮雲合丹之神也呪之可以羽化則蓬素間苑廻合浮雲皆為往來所踐之意神光照室明骨之換矣顏之駐矣則百骸調理三曰清淨自有神光晶熒照室彩霞高麗日五色霞凝光吞麗日昔皆由內景清虛感靈貺而外著矣細意話長生丹成道至功行兼齊引平步三島高接九真夫如是則可以論大道長生之理照然明道德達妙一之本窮玄化之微既象帝之先乃為氣之祖道之至也德亦生焉照然明白即可知矣斯乃深行之謂也萬象有其端雖萬象分歧而三元一致以其非道而不生故得言其端矣變化疑誰信與時消息應物變化隨之而不見其後迎之而不見其首如是則惑之者其孰能信之乎超凡入聖看聖人不疑滯於物萬物未嘗無然物不能為累者以其高超象表逈出凡機方能窮變化之源入希微之妙上幽玄深自在非夫周旋至道自在成功者則無以洞其幽玄眇邈就中難玄津眇邈聖性凝深非耳目之可求豈形聲而能取是曰難矣但味風塵裏冰雪其容風塵不雜道之勝也細而昧之方知宇宙寬雖宇宙之至大而道亦之乎其中矣方知道之寬甘妙萬有而言則何物而不能生成哉世界無窮盡兩曜分照五緯標方又覆地載莫知窮極也論之遠更深𠃵坤分列尊卑定位論其遠則神無方言其深則道無在至矣大矣惟聖明之陰陽分皂白日月運行陰陽生伏體之修鍊若緇素之在目煥然自分尓瓦礫變黃金法遵五行丹成九轉化至微之物成至貴之寶豈為難哉報應終還有至於蓻者無不考圖𧨯順剛柔內蘊至誠外施陰德玄功暗助神丹必成故真人云若我陳偽謬之言則天厭之是知報應不虛矣邪求不易尋求歸道而守迷欲履正而懷曲徒經嵗月不究指歸期遇真人欲成至藥逮于白首轉益狐疑也忩忙誰正定動靜之制含育之𠋫固非忩遽求成其功正定不恒徒勤修鍊須是合天心真誠不差天心自合故崇効於天以濟萬物而成於事何不克哉世利貪拘束人居浮世而貪為生之利則自羈縻而遠於道也欺心自不知外因貪利內即欺心生於自然而不自知也一真求意在道生於一而育萬物人能得一萬事斯畢矣四敘絕參差通變万物莫大乎四時得道之妙者同乎四時絕其參差可以齊聖也頓悟超諸聖人若悟道道亦通人人道若合超凡登聖矣娛情改換癡達人樂道可以自娛頓豁襟懷永無凝滯矣生前如似夢浮生瞬息不達抱一守真之道兀兀然皆如夢中願重細推之至士切於大道道不違願而得之細而推之皆由於願矣愚癡常似醉性昧於情智劣於識蠢蠹凡愚常猶醉矣何異夢中人迷道之人其昬若夢真心未達在理何醒欲達終無見妙道非遠而中智已降欲達未能者何無頓悟之要識也懷疑道豈親真元之氣抱一之端若猶豫而求則踈遠矣非為貪閇口背道之貪非為之議靣惟緘口靜默為先郍是益於身擾擾塵寰區區動識迷者墜悟者升如能順理契真則於身益矣先生堪寂默古之遠道者不言而化故維摩之默然杜口仲尼曰子欲無言種福不傳因世福猶種植而生道離色形諸相泯息故不傳因也甲辰歲高麗國分司大藏都監奉𠡠彫造
