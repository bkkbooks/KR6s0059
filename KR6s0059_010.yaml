body:
  text: 道妙懷真紀異常至道體虛用虛含妙鴻纖不弃綱紀恆存故曰異常人間天上若存至體周通至性無礙存而下有亡所不無道經云無狀之狀無物之象是謂惚恍潛機物類多中覷潛運玄機何往弗濟應乎萬化生成密觀納取虛無定久長體道治物功成不矜自然與天地同休能長且久也碧落遨遊歸洞府大丹既服仙界如歸恣羽駕之盤遊見玄功之不忒黃金不買自馨香河車正氣金砂妙丹本自天成豈勞力致馨香襲景善不可加參同契合諸經說達人著述妙不師心契往聖之玄言作今時之洪範精魄𡙸來爛紫光得真一之氣精魄我還類脫五行超絶五色乃強名乎紫光也無為道大入幽玄老子云域中有四大道大天大地大王亦大是知無為妙道廣大無比盡入幽玄之理也幾許風光慕昔賢惟昔聖賢也儲精養神其門不一若黃石公之遐壽赤松子之長生風光靄然論情幾許實堪傾慕也對境盡同間見識體道之士動契真空對境忘懷觸途無礙故盡同間見識也忙中皆是急相煎冲虛一失萬慮忙然動必區區疾猶烈焰故不可也配匹直須寬雅淡日精月華之為妙也配而匹之務盡玄方明至益必須寬縛于懷雅淡乎性也會有逢時不偶然盡九轉之法度成五色之靈丹會當逢遇之時故不偶然也修鍊但教堅志氣夫壽延金石跡御風雲振物外之清摽顯域中之高蹈豈不堅志氣終契自然也參詳穩審更周旋參而同之詳而用之尤冝穩約審細則更甚周旋乃長養之道盡矣含胎長養盡籠羅世日一陽逮乎秋望在胎十月含育英華凡云長養之資盡在籠羅之內豈離玄談道理麼聖人談其玄門後學募其師範雖千變萬化然豈離於妙道耶狐兔幾曾能乳馬燕雀不生於鳳皇狐兔不乳於良馬得非氣貴純一小不育大者乎麥田斷定不生禾蓬麻性異禾麥根殊且夫道尚真淳日經誡雜是知一氣不可相亂也目前便是真佳境於北守氣道豈遠乎丹田或合於冲虛目前便為於真境汞內消停自合和以四神之靈和二氣之妙汞內之消停得所玄中之寥廓自通裏外體和長生可保認取門深見解開二八之門隨龍虎之𠋫依之修鍊便契杳𡨋體認不虛是深見解矣紅砂奇異湧恆河十臺告曉金鼎成功赫奕紅砂顯彰奇異湧變無盡如崑丘之注恆水焉人心多是少相投人心不同猶若其面所以水火不可相濟善惡不可同塗相投之心實為鮮矣非識塵中上品流大隱居䣑真人由是混迹塵世或顯矣晦中下之流故不識辨也不見真宗歸物理不曉清簡無為之旨混合自然之玄以此冲虛同臻物理也難知妙道後先休非常道之玄豈名言而可及是以聖人後其身而身先故難知也生前內鼎冝烹鍊人生瞬息冝以修身養道精思鍊志吐濁納清矣殊勝華池好漸修神水華池功玄理奧深知法妙好漸修之矣但見完全憑土德知之修鍊仗五行以貌全故土有五德終始用之不可暫捨也能調火𠋫藥皆秋志士得日時升降火𠋫進退秋後寸草秀實所以金丹此時功畢矣玄之玄又見真空當欲而無欲謂之玄以玄遣執故云又玄萬法斯了見真空矣巧拙臨時要妙中智者常守清淨愚者迷於道源如能解心釋神返照正性乃要妙之本大智伏藏知遠近大智若愚故伏藏也洞達古今故知遠近纖盡達了然通洞精鑑無幽不燭達其道本了然而通周旋物性誰區別物任其往各得所冝大道區分故周旋也坦蕩由來是且同姒道虛極坦然寬大其來懸遠混而且同境致三才隨有位天能覆之地能載之人民定之且萬物苞含和柔守本隨有位也神光照室瑩西東靈源妙性謂之神光洞曉內真故云照室融輝瑩徹自西自東還丹未就且降魔夫欲勤𨦣湛陰勵操於粉面者猶慮藥中狼虎貴且降魔矣二八從教細攪和鉛基汞子陰稟陽胎來從二八之門起自一𪠲生處如膠與漆真契攪和故𦒳子云唯之與阿相去幾何離火催驅凡入聖士欲酣飲雲槳永服沆瀣者必從凡而漸聖絳砂而離火矣坎鉛功力甚僂儸金花凝液抱一含真功與造化爭權妙在僂儸者矣紅塵自化真堪貴神室內祕凝永將成明𤗉者走於紅塵烚下全𠬧於碧白雪增盈不用多白雪功成增盈得理妙符神用雅契玄津者矣九轉龍吟成虎嘯青龍若吟白虎必嘯故易云雲從龍風從虎聖人作而萬物覩人非人是狀巍峨夫首象蓬山旁分垣闕既顯巍峨之狀復彰尊貴之名既絶是非共生仰也難求的當問愚癡欲叩玄關須親上智求諸孤陋惟益其疑如問道於瞽者爾𨚗箇堪言好事知學者雖衆尤多泣歧孰知其堪可稱譽名利猛貪無有足名須副實利要無苟若不度德知命貪猥無厭是不知止足也多端動止沒規儀千途萬轍馳騁鋒鋩動靜咸非寧符教義作僞日拙斯之謂歟浮生不實將何用儒稱務本道貴去華巧僞日新終身何益玉虱無當何所用哉欲把非常亂作為不恆其德或承之羞專用非常實為紊亂謾語饒教能配類欺天罔俗言不由衷畫空成有轉白為黑巧生品配其鋒蒠當一朝患害殢他誰罪既貫盈必速其禍自貽伊戚不可尤人千般萬類不相逢道非聲色故寂寥虛靜不可以有象求縱機巧千途奇詭萬狀豈可得而逢也天地尊卑豈易窮天尊地卑𠃵坤定矣及賾其至微窮其幽祕其惟聖人乎海嶽高深隨日轉日月不停由如磨蟻是使石爛南山塵飛北海高深之固尚尓危脆之物豈得長存者哉神仙聚樂隱塵中世代之人為五色五音之所惑亂故神沮氣濁不能輕舉適意令真仙之流窒嗜欲門處清淨域雖隱塵中亦常聚樂蓋心無可欲之所污染也鮮求名利知貪少老子云名與身孰親身與貨孰多此蓋昔人欲令去功名擲珠玉而全真養和今貪求既鮮悔吝不生可幾於道也多事間忙惣是空為學日益為道日便能增見聞悟道體令翻習不稽之事務非理之忙無實可憑總成空也幾箇心賢平坦蕩內省不疚先執厥中心既賢明情惟坦蕩久而不渝者幾人于斯十洲三島自從容海湧十洲鼇負三島顏不耗於日月壽不促於寒暑今既塞九竅之邪戮三尸之鬼從容仙府何所阻焉含元得一本真宗含和元氣得一冲虛本妙道之祖宗皆𡨋漢之真要誤者平論惣是空昧乎大理誤致論量詮萬類以全空述冲元之非有背矣哉廢乎表裏也萬象都來皆備廣而不可量微而不可察混漠無際皆萬象之端備在其閒矣千言譬諭了然通御物指真備乎上士而中下者形乎諭况舉設言端方能通解也才高俊彥優堪賞才高至理氣俊怡神寄塵境以優游踐仙鄉而賞玩矣竊祿偷安有異同尸祿素餐氶顏順旨噂沓背憎反道敗德與夫夔龍輔政房杜佐君一何異哉唯願他心如似我聖人無心蓋從民所欲務彼清淨思復淳和使天下一同皆為善也不教陷惡罪身中不陷物於不義但教人以知方罪漸滌於身中跡或升於象外矣𠃵關萬象審消停夫修金藥六丹神符凝液必先體高天之物象審兩曜之盈虛消息變通凖繩造化子母相傳日月精積陽之魄為母積陰之魄為子母子相成成乎大藥産藥要教千日化法天修鍊妙極至玄金鼎三年藥成千日玄門全藉五行清大哉玄門神仙至教仗五行之精潔立修進之功夫靈胎脫體方知聖始託黃牙為母終成凝液之形故云脫落五行身登上品鉛汞梯媒不是名以鉛以汞為梯為媒少遵修鍊之功未是至神之號金鼎就來從變質積功纍德藥變鼎中非五色之可求顯二儀之力大陽和陰氣兩俱生陽氣純和陰氣純靜二氣交感大藥成矣九重天上帝仙居楚辭云圓則九重居天圓而九重也彼天之上天帝列仙以居之蓋得自然太真之道惣三清而無外凝一氣以渾同也愚昧求真道理踈愚茲妙境昧彼玄津繫風捕影之流却粒茹芝之士求真失趣與道轉踈混沌初分長日月河圖括地象云易有太極是生兩儀兩儀未分其氣混沌混沌既分伏者為天清也偃者為地濁也在天成象故有日月之道行焉蓋與入地而同𠇲也精魂聚散記丹書龍虎相對魂魄相求或聚或散具載丹經離男坎女皆相類二位相生配合日月氣類交感萬物化成壬子丙丁異境殊自子及午為陽位也一陽既生二元合體土王四序羅列終始且火能生土寄治丙丁故云異境也歷劫因緣隨世在靈骨挺生袖襟獨秀因從浩劫緣熟于今雖世世恆存也陰功及物最玄殊玄德動天陰功及物既優既遠且玄且殊神水華池妙更精神水華池者九轉之第五轉也有若息遊慮於神水澄浩氣於華池道在茲乎精而復妙非鉛非汞妄于名真丹之體也不待神靈而生不待陰陽而形不待日月而明不待舟車而行其道自然非聖不達若於鉛汞而求者是謂妄干其名焉河車本是延齡藥千載紫河車者九轉之第七轉也斯乃功將漸就體變河車未階化羽之期先示延齡之力戊子從教配類成戊為土也土從火生子為水也水居陰位一佐一助一伏一飛配類五行成于至藥朱雀坎蛇安在後南離為朱雀北坎為騰蛇安置丹爐然後為得青龍白虎免交爭東之陽春青龍在矣西之肅殺白虎居焉欲免咬侵冝各處其方位也若使真金全二八龍虎金丹之九轉也自卯至酉十月之功若能體彼神玄全乎二八之𠋫者無不成金矣何憂住世不長生妙道有成神丹克就去則乘風御氣生則久視長生何往弗藏無所憂矣還知受氣稟天然道與氣凝故道氣混然是以氣住神住神住形存乃天然也百法方為事理全金丹之術百數其要在神水華池配合混融方全事理假合都來歸至道天地動用之玄陰陽運轉之妙五星四象惣合虛無也修持遠大更通玄爰從太易直至坎離二卦其間從無生有從有生無相含養乃更通玄妙矣二儀交感成祥瑞日盈月滿㸦為相生陰陽數就方成丹矣八卦剛柔被俗牽聖人託易象立卦𠋫發智者而悟真英豈彼浮俗而能消息焉何謂此中生恍惚志修大藥動契天機何在狐疑強生恍惚也直須欵曲細精研靜而思之精而鍊之直須通幽洞必證徹視證聽者也玄門至道故無涯深妙之用生乎萬物謂之玄門虛極妙性應用無方目之至道應機設教故無涯也自是人心所見邪道本凝然志當歸一學者迷真動而有變故所見邪也智識未能通大藥金丹大藥其旨深玄或智識淺豈精通深妙也豈將容易擬榮家一失玄津動皆是妄既無所得何可榮家乎千年聖境何虛洞天聖境道在長生或住壽於千年或延齡於萬世事豈虛設想無謬焉百劫曾修不用遮夫達其道遇其真或百劫以修心或千生而鍊行福緣善慶形直影端矣龍虎欲成堪鍊鼎陰陽交感龍虎功成妙契真玄乃同鍊鼎矣勿為利路亂交加夫欲滌除玄覽象外求真鶴駕鸞龍軒濟物或布利而亂心成交加矣論功須是一陽初夫造萬物之基須向一陽之始鴻漸於陸九層之初矣二八調和作楷模結氣朱英金花凝液初二八之交配畢子母以相生固濟但牢封密閉八卦為爐四神護衛猶荊山之蘊玉若岱嶽以泥金莫教中道有差殊德冠五行爰從真一青乃東方為首黃仍中道稱尊甚勿差殊極須祕密依時消息專心記將欲神棲於靈寶消息於洞真者必精專為功節𠋫為念也在意停騰運火徐丹臺有名神室用意既徐徐於火𠋫恆惕惕於爐前矣日月無虧眀節𠋫從一陽生造十月滿積功纍德自下升高將㱕沐浴之時可近臨之日從容願所不躊躇滌除玄覽情抱冲虛果夙願心何躊躇之有也還丹百數細須尋黃牙白雪鶴頂月華如是異名盈於百考其功用妙在華也蹟奧探微理冝周細以驗從來道理深大丹真訣展轉幽玄若不研窮豈知深奧火𠋫混成如白屑離宮有凖實鼎無差陰抱於陽混然成一如王之屑皓影無倫水中凝結是黃金陰中有陽混同一氣鍊之得妙結以成金陰陽相生自然之理循環復始周旋鼎鼎之設也法彼二儀通乎四序終而復始循環不停造化驅馳要用心修養之功齊於造化區分擒縱至險至難切在問防慎終如始消息玄門窮八卦大藥玄關通乎八卦六㕛變動二氣感通其象昭然善自消息飛騰自在遠山岑神丹外就玄德內充功至行高自能輕舉丹丘紫府任性優游真空修鍊永長年靈臺內靜玄德外運修之於身則功齊造化養之於壽則年等龜鶴也不識還丹在眼前道經云常有欲以觀其擊蓋性失於欲將觀妙本則遠在邊徼是知還丹之法內境虛明在外物空寂若背此而求雖在目前莫之識矣一得清來光宇宙天得一以清乃至侯王得一以為天下正雖遠舉天地之清寧會㱕只在於侯王俾令守雌州道求光宇宙也千朝須是用烹煎且天行倢君子以自強不息所以日慎一日惟一惟精庶修鍊精氣臻於妙道尓人間天上分眀録業就功著世人攸仰道光德馨仙籍明録蓋由絶學無為而無不為也汞裏花開豈偶然華池發潤金鼎流光伏剛以柔制動以靜致花開汞面藥熟丹爐事匪偶然蓋自真修之所感也達取但教依理路大道之路坦然夷平好徑之流自踈履踐今既或遵妙典不爽格言無怠勤修何道不克勿貪世利誤周旋世利未息寵辱且在故為患之本也既失前功行又誤彼周旋垂誡之言尤冝佩服也烘烘火色水中論純陽赫赫在乎上純陰𡨋𡨋處乎下陰陽混蒸可論中矣至寶須教鼎內存五行有緒四位無差列鼎乎造化之中至寶存陰陽之內點化自然常在手夫點䥫為金化凡入聖雖理極自然且常居掌握矣區分道理有玄門造化雖廣物象有歸隨冝而容應用而遣然大理真漢自有玄門莫將容易誇言說變化之理道極神功妙在真歸談何容易盡入虛無是我尊萬類紛然皆歸無象無象之理乃是尊焉玄綱論云此所謂返我鄉歸我常與道傴彊天動地神邪可畏𠃵坤位正則鬼神不得肆其邪陰陽丈進則水火安能固其位當修鍊之時冝其慎乎丹能飛走似雲奔妙用通玄功成道至可以飛靈彩走神功通幽洞邈聲雲奔也人是人非意頗同人之持論㸦出異端其意頗同是非殊解較量此事盡歸空較彼是非品量見識未臻大道觸事皆空無為政化求真理體真理而合無為扣玄門而敷政化盡善盡美功成不矣方表深仁大道雄不仁而仁仁膈有截不德而德德被無彊大道深仁非雄何謂舉止但能恆有節夫聖人之動息猶天道之卷舒舉必有常止必有序靜專動直其在茲矣尋思何處不周通道體周虛道性無礙出處由此無幽不適寰瀛善惡知多少民之善惡皆由乎心以道治之物無不化莫忘生前積德功至功至德法地法天民惟樂推史無不載矣因緣業障遇真稀名未桂於丹臺品未登於仙籙故因緣尚遠業障尢多所以遇真者稀也黃帝乘龍豈是非史記云黃帝鑄鼎於荊既成有龍垂髯而下黃帝因遂乘之上升於仙又豈非也達識尚凝常恍惚有達識者常凝然於妙道故老氏云恍恍惚惚其中有物也愚蒙學解故相違愚蔽蒙昧之者學寡洞真解非博物執以五金八石而為妙者故相違也華池祕密人天授華池者乃九轉中神水華池也人不虛授天不易求故云祕密也神室光揚日月輝𠃵坤交泰離坎相生契彼三乃應茲九地乃謂之神室也以日精月華而為體故光揚顯其輝彩也智者無言皆口默達大方者到佊無言之津所以默也敢將容易論玄機天非愛道人亦能修故就無言之言以申無說之說諒非容易務盡玄機庶幾乎名利仙籍者一議究焉甲辰歲高麗國分司大藏都監奉𠡠雕造
