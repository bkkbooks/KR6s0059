body:
  text: 日月無私照懸象著明莫大乎日月運轉不息照臨無私以濟萬物也人為似等間日居月諸一寒一暑而常人不悟至理貪愛日前如等間尓忙催紅葉落發生之候盛衰之理蓋時使其然若忙催之殞落矣靜想白雲間白雲無心悠然出岫靜思其慮堪養聖胎善念皆知有念依心起情因意生儻盡去𢙣緣皆修善法道豈遠哉非緣勿用攀理非合道事更違真緣習靡忘浮淺日益也目前深邃理大道者不可得而親不可得而踈蓋玄同和衆常在目前儜慕學之流窮深曉邃矣郍是扣玄關扣寂寞之一造希夷之域擇其流品實難其人精心求一善精思鍊志到虗無心也一善者即得一沖妙之理也一善許相宗此一善者萬法妙用大開玄關從人之欲任物宗師矣利物無窮盡善道之宗廣同覆載不唯一身獨善兼亦利物無窮矣分明理道通宗善悟道益己兼人道理顯然猶軒既之辨妍醜矣正邪名恍惚對正名邪邪既不存正名何有是謂唯恍唯惚妙用難名者也曉悟見真空曉其本元悟彼妙道以無見之見悟真空之空也象外行持法達道高士土木形骸所行之行所持之法無狀之象混合希夷謂之象外矣玄言顯聖功聖人之功終日作而不作行而不行以玄言言之顯而導之者也百法還丹數神仙至人作事有法約言百數其䡄甚箋矣玄門各自深同體異名門門契道皆遵正本各達深淵真空光似日真空有象象即虛無類杲日之無私同清光之燭物解脫本由心解諸縛著脫除凡質見真空境得不由心矣迷惑終無應先窮正道方履玄途豈冝攻彼異端迷於妙理者精修重古今倣先賢之繩凖遵今日之楷模必在精純湊乎靈域者矣循環豈暫息子母㸦為於根本陰陽交致於生成功類循環輪轉無息也七聚寶高岑天地爐開神丹功事貴同七寶濟何窮矣剛氣縱撗合純剛則陽私邪不雜混然一氣契合縱撗矣無人到所思玄德深遠至理自然未見忖度所思而能扣寂浮生看即易滔滔塵世汩沒往來未了幽玄見如於易也至理杳難知沖玄至理眇邈無形安遣凡人而能轍扣矣返覆因興念念茲在茲返覆攸致原其終始咸由憶念為因矣恆持入遠期夫士之修道耿介其志恆持其心但慕進修遠期入聖矣孤雲霄漢外得理優遊超九脫屣自地外漢逈若孤雲者哉花見晚霜悲霜華萬物卉木其萎未悟於道雖榮而終喪也我説逍遙理聖人於物無滯觸類俱通廣演逍遙垂乎訓詰其如要妙深放曠之旨其道幽深妙達玄關造次何測悟來時頃刻曉達之者不假多求道在目前悟之頃刻迷者豈通尋失之毫釐謬以千里既迷於旨趣豈勞於研尋者哉達即隨情遣通達大道體會真淳即事隨情任緣而遣真緣不可侵真一之妙杳兮𡨋善萬象不能混其形六情不可縶其意者也從來皆是事森然景象邈尓沉思事事皆真從始無變矣巧拙在人心和粹沖淡本無短長蓋人心有於智愚致事理分於巧拙尓一法歸千法玄元妙旨博總群經以一氣貫三才以一法歸衆法故云聖人抱一為天下式真如即是真於諸法中體了真性行無相行言無言教乃是真也迷情終不見迷情滯教不見真常達士契真不害於教老子云我幅異於人達了悟知因悟道之人心照清淨滌除玄賢能無疵乎海納分他境衆水朝宗群流藂萃雖分異𣲖同納一源亦猶統道真乘萬化俱服也心平故可親了乎虛靜之宗專務為治之本以万物利為利以百姓心為心得不平也但明修鍊路欲履大道精行為先必體真如群動咸歸也善業盡隨身谷神不死響應無方為善從之其理明矣真一生天地夫道出沖和妙氣含養萬物配陰陽為一二之基故列子云一變為七七變為九九戄變為一一者形變之始也因依認宿緣天地孕靈沖氣調和因依生發皆契宿緣故陰符經云天至私用至公者矣智高通理性其或得意忘言智通心照悟空空之理析色色之談玄解自深高低殊隔凡下少周旋中士已降溺於塵滓雖聞妙道不能周旋也語默何奇絶夫不為可欲所亂令心境俱靜一無所有則心與道合聖理奇絶者矣幽深隱聖賢智與聖識與神會探賾索隱與賢聖而同轍矣誰人解我意逍遙懸解奧妙沖虛內景湛然希夷自得矣大道寸心玄無名之道衆妙之門理括恆沙達乎方寸天上與人間清淨者生飛天嗜欲者生乎人自作所召非天命之有二也賢愚不暫間人之所以不遑暫寧者皆由不達於道也愚則可尓賢何然哉斯乃世俗之所賢矣矜乎巧智背乎淳德故老子云不尚賢使民不為爭精修歸至理精研道法胎養神氣造次於是絲毫不差則自然歸於至理焉道大隱玄關域中有四大而道居其首焉迷之者不能虛心而玄覽則隱於玄關矣聖境皆奇絶外則紫府丹臺內則三田九竅道無不在智無不通是以聖人觀之皆為奇絶之境凡情豈易攀凡俗之情闕途成滯陟斯真境不亦難哉群仙寬坦蕩洞府神仙皆通至理寬而無外坦而無私蕩蕩焉不可得而名也却老盡童顏玄德內充神丹外助足以却老返少長生久視矣探玄何妙理太玄幽鍵妙一祕扄必欲探之以何至妙之理而可及也此蓋嘆道之深矣元化得均勻窮元化之源得亭毒之妙生成品暈要在均勻也去住分明紀既得元化之妙顏同修養之方故動靜思之分朋紀於深裏務盡勤行也終期遠大親遠者大者唯聖人能知能行故終事躬親而為之所以作程於萬世也物華堪賞詠妙盡物事咸歸至理亦足以供於賞詠也離撓最名一真內照諸境外寂動無所著舉必皆通故無撓矣若此最名也碧落翻霞彩驂鸞馭鶴上升碧落者必高謝塵蒙輕翻霞彩也千秋不老春歷千秋而不老斯可謂之長春矣神仙之壽皆若此焉誰人信我説希言演道舉必忘筌旨趣常庸欽奉者寡老子云信言不美我説亦非常契理誠言出乎與論窮淵至極實曰非常苦行分明樂望勵志行𠕀憚勤勞趣道樂為孜孜不替也緣深解即忙奉教有緣照理生解進修無怠功成業茂矣乖持如似夢蹤迹異轍乃曰垂持妄動非真其猶似夢慕道得清涼照境通玄見淳元本性既常於無欲道必獲於清涼尓影響隨聲應至本虛通至性隨物猶形生影猶谷應聲神用無方其在茲矣玄門可度量道雖泯迹有感必彰恍惚沖微得之非遠逍遙通大道遊泳無著以形忘形悟理混融身通大道也物象古從今無物之象是謂恍惚執古無為之道以御今有為之事還淳返朴矣一氣無窮極一者沖氣也言道動出沖和妙氣於生物之理焉故無窮極也三才妙更深其高惟天其厚惟地其靈惟人同得於一皆依於道故妙而深也愚迷皆自縛愚者昧於真迷者背於道羈束於浮生自縛者也聖境可周尋聖人妙境惟道是宗孺子可教者令周而尋之指歸至道天消息存亡理夫德失而仁存仁亡而義亡退仁而行德亡德而合道能消息之上德無為之理也先憂力不任道常無名德者道之用下士聞之不能勉力行之而多大笑乃力不任也法則定𠃵坤法天行健則地守謙規矩有儀修鍊無忒千秋與萬春道常無變一氣恆真既體無心能長且久金烏飛絳闕鼎器既立至藥告成陽精發彩於紅爐輝煥照臨於象外玉兔弄精神陽威已舒陰魄仍顯精神驚躍氣候交馳達識逢堪笑大人君子識廣聞嗤彼未知觸途成擁也賢愚本是真洞達幽微耀神澄慮賢愚一致物物皆真清風搖聖境陰虎才吟清風發吹輕搖真域微動芳林仙説洞中人神仙至論玄妙非虛別有洞天群賢勝賞尓逍遙間物外優遊無為放曠寥廓物外之趣逍遙是依矣大道體柔剛𠃵坤列位陰陽順䡄生成之功剛柔之理體而象之道在其中矣山河窮不盡山嶽高大河漢深遠窮其邊際莫知其源人心自短長鳬鶴之脛本乎自然唯阿之應出于恭慢咸是妄情自誑心識也塵泥常曖昧塵埃泥淖曖昧非淨亦猶嗜欲執滯障敝妙道不得明曉也日月瑩輝光日月麗天輝華流彩無私燭物運轉靡停尓出沒機關內消息盈虛機關動靜伏藏於密出沒惟時也調持逈有方法尚藉言順諸方制其為至道逈可依憑矣發願行平等所發之願無黨無偏不間親踈普皆平等天觀必照知天眼若觀無遠弗屆九所為作必能照知貪嗔常不見為善之人惟日不足貪嗔之境不見在前蓋惟務於利人尓善𢙣豈相規執道於心一路平等若善若𢙣不能相規利益恆將正惠利之門既非一種須去邪而就正方益物以利人勿教亂所思一真在花霍乎不因中正炳然是則思無邪矣因緣如響合從因生緣各有自分譬猶谷響符合無差忒焉變化杳無為千變萬化其道幽深杳然無為不可以探賾矣具足人難得言行相應動靜咸若諒茲至德間世希有也𦖟明別是非視𥊸不感必可以抱乎淳一捨彼異端是非之言顯矣心誠符感應志誠感聖上下相求故云天地感而萬物化生聖人感人心而天下和平清靜扣玄機且夫不性其情逐欲而動欲扣玄關其不可也必曰觀乎妙本清靜守常詣通見真趣理非遠也道大雄名久聖人知雄猶慎用壯務守其雌於道久矣真邪有順違真理正直邪法迃回此順彼違以道為爭也精專間彼我精思奉一彼我俱銷故云間邪存誠善世不拔萬法一宗歸聖人處無為之事行不言之教萬法咸一歸乎本宗志節還難得翛然自適憂樂兩忘拪間林麓持守志節寒暑不移矣剛柔説是非陰陽相配是非㸦作故易云愛𢙣相攻屈伸相推也秋霜明至道白帝司秋玄功克就萬物成實威行霜令此天之道地之德也春日麗光輝春日遲景和風扇物百草以之而萌動萬靈俱受其昭蘇易云日月麗乎天桂影芳紅樹蟾蜍桂影碧葉垂芳蘶䓾不在於地中蓊鬱自高於雲漢馨香入紫微光射牛斗香入紫微金丹成九轉之功德骨步三清之上矣無窮天地理陰陽之數覆燾之功恬淡之理故無窮也語默自依依夫道沖邈尊用光默默自守遊神之極也詩中包異境惣括百篇包羅萬象修身鍊氣之道金丹上藥之訣皆在其中苟能玄通則庶幾於道矣解者不為非其言曲而中其義肆而隱達斯旨者則孰敢謂其非理哉深信含玄理有為事中含隱玄理悟之則陶然反朴迷之則瓦扇勞生中士猶迷信冝深尓幽通是可依幽深通達妙契希夷惟道可專誠堪依託達人皆論道道者一儀之母萬象之主其大也無外其小也無內悟達之士勤行無倦亦論識其精微也狂酒敗稜威酒以成禮不至於淫也浩渺寰瀛內寰瀛之內包括八紘况乎滄溟浩渺無際寒暄隱聖機法天而行道者生成之仁則如春之暄號令之威則如秋之寒斯之妙用皆伏藏於聖人之機也逍遙名不易夫物之生也稟靈受氣雖或萬殊至於品物大小各當其分逍遙之理一也故逍遙之名曾無易矣一法貫真宗但以逍遙之一法而貫之於真宗也入位誰分別始於長生之術也或分知其一二洎成至道入真人之位則猶百川之赴海滔滔然又孰能分別其異同哉深玄隱大功既盡深玄之理唯達者能知光而不曜所以隱彼大功也杳難測度杳杳中含至精誠非下士而能測之故云難矣象外理皆同必能妙達玄中深窮象外則彼此之理無異也洞府群仙侶洞府群仙皆稟靈符授金簡羽駕電裳有道之士也所以嘯儔命侶矣三天順九重三清之境謂之三天也且天有九重三天順而次之實無上清淨之靈居蓋真仙之所御也靈無知者少虛極妙理希言自然達本知微世甚寡矣祕默在丹田精鍊內丹導引正氣凝注神府以潤丹田祕而默知信有神也鉛化金根樹夫採四神氣鍊五行精更為主客𮞏相含養遽令鉛化成金如猶指鼎葉茂分華揚芳無際尓鼎光玉液泉鼎像於宅永為其主名之玉液若泉不竭光彩藝物流潤其中相宗難且易難而後易必有成功入宗道不離依制有準可不易哉絶妙理深玄陰陽不測靈變罕窮非凡所知故曰深妙也真境猶來是明陰洞陽道成並既居惟真境身超上仙皆自三丹感茲萬化尓依經斆昔賢依法丹經效諸往哲順五金性明八石體修之靡忒何道不諧者哉得一便須休天清地寧神靈谷盈皆資妙用而得一者也學道之士得真一之道者可以休息矣真空象外求象外無物真空強名無求而求真空自證如求者也昭然寬世界道既融明心虛浩蕩蓬岫昆丘之遠丹臺紫府之遙俯地拾芥耳幻化似浮漚既達清虛之域却觀幻化之身不異浮漚無忽有矣祕隱玄中理玄中之理衆妙之門恐執玄為滯寄又玄以遣玄祕之隱之者也幽深事莫投希夷之淵乃幽深之事忘視忘𥊸莫可投之矣天涯無畔岸天無涯際六合至大巨海至廣道皆居之何所拘礙乎寶月順波流月在晴空影沉波內道隱象外妙合身中寶而貴之隨流而已甲辰歲高麗國大藏都監奉敕雕造
