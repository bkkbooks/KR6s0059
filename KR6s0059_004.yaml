body:
  text: 白日眾生見道在目前猶如白日群情共覩良以無私老子云吾道甚易見幾來得意人然而得意忘言者鮮矣老子云天下真能見莫能行萍蓬如似夢於真未悟觸日唾寧身類萍蓬自南自北心同夢𥧌若存若亡丹鼎妙清神孰知乎金丹寶鼎為度世之津其妙也清人之神神清則可以復於淳素爾紅樹非花影如樹亭亭紅光赫弈屢經烈熖久而彌芳斯乃藥成之象也非如草木之花倐然而謝青松𡑅海津藥之堅性不為物遷如松之貞陵寒益茂𡑅海津則高遠之狀入玄龍虎伏青龍為陽白虎為陰二位交時自相制伏斯則入修鍊之玄奧通造化之神妙矣大道許相親丹心成也可以延齡而後世變化而利物從有入無與道親也雅澹玄中得清虛雅澹之道得自於太玄真一之中也常人故不知中人已上可以語上中人以下不可語上也故道之精微造次何知也幽深無遠近若論夬幽深之旨遠之者則怟掌可知故不可得言其遠也昧之者則終身無取故不可得言其近也若然則道非遠近性有明昧耳道外細推之道之體則卷舒而莫繫道之用則動靜而咸通夫能推道之用外無所得則可以歸道之體內無所為也以無為而為之則精真存於內以無得而得之則妄惑遣於外若此之幽深豈常人之能知也碧落神仙境丹臺玉室碧落瑤池皆神仙之絕境也煙霞日月隨象外之煙霞壺中之日月隨彼神仙之至止也叅詳寰宇內只於寰宇之內可以叅詳干以見仙几之異也邪正豈相離有不能正其怪者則為五色之所蒙五音之所蔽斯可謂之邪執矣如能正之則道冲而用也且五色可以和其光五音可以同其塵望邪正則有殊語色聲則不異故云豈相離者也逍遙通物性夫至仁遊於無為大鵬翔乎寥廓放意於自得之塲物物各通於性矣大道有圓方大道無形方圓應物是以聖人直而不肆方而不割蓋任自然全其本性也山谷高深淺山高谷深亦如天尊地卑各當其位無相𡙸倫尓人心自短長有無相生高下相傾皆是妄情強分彼此也陰陽窮豈竭一陰一陽猶文武也偱環相湏豈有窮竭㦲造化入無疆運動不息生發周普卷之則絲毫不盈舒之則宇宙非大無象之象莫容其邊際焉塵埃飛作垢隙塵微埃飛揚不止積成垢染蔽障真淨求道之士苟心塵尚尓亦漸染而成累也驚鴈不成行驚鴻四飛不顧儔侶蓋失於次序也有類道失真源學成異轍心靈馳散依仗何從矣群生各自意人生稟靈用意各異戈愛漁經獵史或即好道慕仙各遂意也未有一般般靜躁既殊方圓亦異萬殊之態不可以一揆論也名利貪嗔賊浮名薄利所拘饕忿怒不已縱六賊之妄罄一真之財吉道遠矣愚迷道路寬癡惑所迷玄默可究未脫屣於塵出信亡羊而蓋遠也避煩如雨散煩擾久困就靜避之廓如雨散晴空情思頓清霽矣清靜入雲端無貪自清無欲自靜高尚其志杳入雲端者也善想因緣理澄神想之乃因緣會遇以理而推實善惡𡨋符矣經窮子細看三教典誥窮其奧妙欵曲看詳見報應昭然者也皇天無不照皇天無親鑑物不滯臨照之道自無私焉福業重來輕積善餘慶積惡餘殃善惡淺深故有輕重也背正堪何益信言不美靜性減耗背道乖真有何益也歸真道自成修德忘功抱淳守一無心於道道自成矣本元宗一體混元之道其體唯一動靜作用妙在無方矣功行錄三清積功累行鍊志修心名錄三清高超物外幾許解吾意道非生法不可致詰知之修鍊謂之聖人慈悲利益平慈施安樂悲能濟苦拯物利生平等為善得道超凡聖順俗則鄙悟真則神令世慮既除玄機已曉超然物外永謝凡塵逍遙本是緣恬淡貞素優游無拘此乃體道之流本為緣矣群迷難解會迷真背道厥徒寔繁既昧希夷何能曉解矣我且不虛傳聖人立事發言垂於世皆傳之有自豈誣也哉但信恒無斷至道之士以信是宗信既有恒於道不遠矣精窮用意專精研外塵窮達內境而於元始修鍊在乎用意專志歟審聽眀譬諭道本無象非俗能知是以聖人舉况設義皆令諦了也勿被俗情牽俗態有欲至理無情儻固守精淳遠離聲色情如不惑神安蕩哉物情通萬象品物之情其雖廣含育之道萬象皆通達者便忘機拘執凝滯於事未通若能達本抱真可以忘機息慮也各具含靈性蠉飛蠕動博識寡聞愚智雖殊各具靈性狐疑有是非不能省悟真玄而有妄生高下狐疑不失乃見是非知天修福惠知有天道高乎人倫仰而慕之乃修福惠如日瑩光輝杲日麗天光照萬國達人識量高廣通明有若曦輪輝耀光大者也認取好𭭛路險𭭛危道喻彼惡緣坦路通衢譬諸善行路𭭛既別是冝認於善道焉惡去善相依夫形端則表正心直則辟邪但能去惡以修身何患諸善而不集經心玄妙理能了諸法本無二門一以貫之不生他見以茲妙理介乎自心也道德念陰符雖道常無為而以上德𡨋念陰符契乎淳朴也九轉金丹鼎方士修鍊遵法師古九轉之功既集靈丹之彩奐然三才玉匱書玉匱神經詮真弃妄之本也三才樞要何往弗臧恒常皆隱秘至道非遠常背之隱秘難彰良可太息達者見清虛達彼微言見乎清淨了無所得入真玄門倐忽神眀意倐有忽無神眀無狀無狀之狀故云其中有精先賢覺自愚至人無心運動隨物純純若遺其猶愚也天地含清泰天地之理覆燾之功含育萬物皆符清泰者矣陰陽道所成日精月魄陽鑄陰銷其道必成其功必著故易曰乹道成男坤道成女也冲和玄妙術陰陽含孕冲氣調和然後萬物阜成謙卑柔弱故經云負陰而抱陽也勿訝說長生聖人以道莅天下茂養萬民虛靜為心澹泊留意乃可深根固蒂久視長生起信何疑悞夫篤信既立大道孔彰然後疑去障除翛然頓悟者矣迷來却謗輕斥鷃之步迷九萬之程朝菌之短疑大椿之年懸隔道殊寧不謗哉攝心歸正念正念思惟攝心歸本得萬法空空之理悟人天我我之情也淡薄惡銷聲道之出口淡乎无味何惡跡之不除何淨行之不著者矣混沌初分後混沌則冲和之一氣也𡨋蒙若雞子之未形既道以發生為務又安可久而凝滯故湏至於分剖也陰陽辯濁清清氣升而為天濁氣降而為地二位既形則可以區別爾三才皆備位二氣和合含育至靈始有人倫備三才之位也萬物有長生造化之功綸萬彚生長之德包博無窮埏埴綿綿如天之長矣𠕀象精通感杳𡨋之精真而有信通其所感不亦冝乎淳和道可眀淳和之道雖曰虛無若能弁智守朴存神而叩之則自然明白爾但求方寸是至道之要莫若修心君子求諸己若能內觀以至無瑕則真所謂以身觀身也剖判應非輕道之眀矣心之正矣則可以剖判至理應彼機冝斯為至難不可輕矣五色雲銷黯神鼎纔就靈符聿臻藥既餌於一丸雲乃登於五色蹔游萬里少別千年如其向象外以長生自得逍遙之理至若顧人間而高謝能無銷黯之情方知大道深若此之神功蓋稟天地造化之力日月運行之數方知大道之至深也華池玄妙理華池大丹九轉之中神水華池也鈆汞相資坎离迭運從無入有自有還無情既極於玄源微乃通於妙本則理在其中也龍虎本同音以其同氣相求故得謂之同音也金鼎鈆中作法陰陽而為爐則金鼎之謂也舩既烹流珠是作周旋四象消息五行法度不遺終成大藥紅花洞裏尋鍊丹竈於寰中尋紅花於洞裏求真如得路求彼真人之路要歸不死之鄉必湏妙盡希夷𡨋資道德也返少老山岑歸童返少老而彌芳是曰真仙好居煙島也達取真空性真空惟寂妙性本如達悟洞然縱橫利用也成名有後先道非遠近悟有後先雖不同時孰云異體矣智勞如似夢巧運機関詐施心智縱事果於十全亦虛同於一夢尓恬澹不論年嗜欲既莭恬澹自如保守攸長豈論嵗月也閇口恒持默外緘於口內𡨋於心靜默不渝可階於道矣精修更是玄夫知之匪艱行之惟艱今審法玄密無怠精修速疾之功因而致之消停湏在意消息盈虛廣大悉備在乎心意以通幽微㦲安穩上清天天道匪遙修之可冀而况名摽王筞籍紀丹臺故五雲佇三清穩步也礦鍊真金色礦藏真金烹而鍊之色煥然矣如凡身蘊聖性也菩提道果成菩提覺也覺號圓滿成佛道果猶真金出礦矣仙人持忍辱佛於往昔作忍辱仙莭莭解時不生嗔恨者也胥國福眾生華胥清淨黃帝夢之見彼國人不知親己不知踈物受用自然福莫大也教法堪依信聖人所說謂之教法堪依堪託信之奉之也勤修猛要精恭勤修習誨人不倦精而行之善弗能及者也若能功行滿陰德廣施功行濟物有始有卒道自符合矣故是達三清道悟真一身合虛无自然脫屣塵區必達三清者也至藥家家有至藥以况至道也人人本有而悟之者寡矣誰人解得麼大道匪渝於物外凡人𠕀究其根源誠可悲哉視半猶遠矣玄通真法界𢍆理斷疑渙然冰釋法界無不真之境見聞絕視𦗟之功也妙理諭恒河水有上善之功河右通濟之用亦猶能體妙道流注未聞者矣年歲銷風水陰伏陽升荏苒成歲俱臻至理光景任遷諭彼恒河暗銷風水芝蘭間𣗥窠性習不同善惡各異慕善者為道日慕惡者作偽日拙亦猶芝蘭自茂荊𣗥自卑者也陰功陽造化種性既異根莖不同徒勞造化之功莫報陰陽之力善少惡中多為善孤立相求者寡為惡成眾相應者多也瘖瘂癡聾病心存嗜欲耳務奔馳不能唘迪凝虛發揮正性類乎瘖瘂與癡聾耳求醫大法王至道至大法之則之夫欲抉聵開愚湏憑聖智者矣貪瞋無相體貪瞋則惡見無相則真空其或動合貪瞋靜歸無相雖體性無異而逆順不侔矣正定得清凉不務可欲內守凝明湛寂無為自然正定不亦清凉者哉達者通賢聖苟能達道悟真乃名列仙品位通至聖矣迷情任意狂情既昧理於道不通放蕩無恒意同狂尓分眀如是說達則舉事皆真迷則觸途成滯所以明言作誡冀分是非也寂靜有閑忙寂默虛靜本絕煩囂而懵道執言自為馳騖既違寂靜莫息閑忙也漸省虛名理虛无非名之理放意自得之塲漸以修持故能省覺矣真求一味清真一之道自何而求但冲澹澄凝則清淨於一味之理矣目前皆是景萬象之景森然目前體道之人於景皆寂心內蘊長生長生之術非假他求若修之於內心自齊之於外景白露秋催促代謝之流馳不停當白露之屆時見秋光之催促紅花葉自輕四時奔騁春去秋來纔開綽約之芳即覩凋零之葉物情歸即悟物象之情本歸空寂即於此理可以開悟者焉疑滯兩無成大道坦蕩依之可修若於心不通在物疑滯枉度於春榮秋謝莫臻於體本還淳虛過時光則進退無成矣紫陌紅塵裏欲彰至理先警浮華輪蹄碌碌於紅塵早暮紛紛於紫陌悲夫貪名利好爭馳騁虛名何嘗責實貪求小利但顧爭衡世情皆擾攘寵辱若驚聖人慜惻不覺老之將至擾櫌何知也大道甚縱橫道通四大誠謂縱橫妙本融虛物物咸具絃直終無曲無彼無此何親何踈徑直如絃本非委曲心邪自不平平等無傾回邪自致釋氏云是盲者過非日月咎若能如遂意垂誡群甿功成不宰以心如理欽奉无為故云功成事遂百姓謂我自然也後學法先生學而時習業具諸蒙見賢思齊其道著矣寂靜皆無語夫虛靜之途洗心之術當高興遠寄陶然自得默默深識滌除玄覽也其於理一般言无瑕謫行无轍迹得希夷之妙入杳𡨋之閒齊物一般等窮萬法也若非通秘奧夫神眀之德秘密之門鬼神莫能覩其玄陰陽或可測其奧也故是入微端道无聲聽之不聞道无形而能形焉故入毫端微妙也善可名高尚上善若水眾人之師處德謙卑能利萬物然後為玄牝之母居象帝之先真乘智識寬智周萬物道濟天下然聖人无心運動而萬類自隨无智取與而人之自歸矣天長與地久見真素把淳朴緜綿若存天長地久萬物不相干天地生物德用甚多而能咨稟於道心存澹泊不相于撓也天上及天下至理無外包括彌綸或天或人咸歸覆育斯乃彰妙用之至廣爾施為𨚗是親雖施張一氣資始三才功成不居孰為親矣物情歸造化物之有情者皆稟於至靈之氣雖識智萬殊皆歸於造化之理也大道見深仁夫道之為用也然則生成萬有視同芻狗不責其報是以見仁之深矣果位非遙遠悟理為因得道為果筞勤無間相去非遙賢愚自苦辛雖賢愚非等若不悟道之玄妙者或訪神仙外求異術或鍊金石用益遐齡既背天真徒為勞苦焉知皆日用安知乎語默動息皆道之用也而乃捨本求末何迷之甚哉秋換一年春一歲春光寧殊石火秋風䬃至萬木飄零可比童顏倐然衰老矣表裏分眀說夫善攝生者養外之謂表養內之謂裏也得其道者兼而有之故可以分明說示於人也深窮妙更玄其能深窮至妙遠趣大方則更玄之又玄矣愚迷行不到愚迷於道闇而不達也至於俛仰屈伸進退消息無所用心雖欲行之焉能及也聖事法中傳决志虛無宅心清淨者乃聖人之事也動必資玄舉必盡法法中之妙習而後傳也欲界情無定乃欲界而未能性其情則觸途無定對境多迷真空本自然頓了真空長存正氣蓋本之於自然也今生隨曩刧原道之來則界惟無始雖今力行無倦要自曩刧曾修故云隨也清淨照三天必能致心於止水納性於玄珠清淨無為恬澹自守則可以照彼三天之上也
